<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedrock</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <header class="app-header">
        <h1>Bedrock</h1>
        <nav class="tabs" role="tablist">
            <button class="tab active" data-tab="skipsloggen" role="tab">Skipsloggen</button>
            <button class="tab" data-tab="financial" role="tab">Financial setups</button>
            <button class="tab" data-tab="agri" role="tab">Soft commodities</button>
            <button class="tab" data-tab="kartrom" role="tab">Kartrommet</button>
        </nav>
    </header>

    <main>
        <!-- Fane 1: Skipsloggen (session 47) -->
        <section id="skipsloggen" class="tab-panel active" role="tabpanel">
            <div class="kpi-row" id="kpi-row">
                <div class="kpi-card"><span class="kpi-label">Trades</span><span class="kpi-value" data-kpi="total">–</span></div>
                <div class="kpi-card"><span class="kpi-label">Åpne</span><span class="kpi-value" data-kpi="open">–</span></div>
                <div class="kpi-card"><span class="kpi-label">Wins</span><span class="kpi-value" data-kpi="wins">–</span></div>
                <div class="kpi-card"><span class="kpi-label">Losses</span><span class="kpi-value" data-kpi="losses">–</span></div>
                <div class="kpi-card"><span class="kpi-label">Win-rate</span><span class="kpi-value" data-kpi="win_rate">–</span></div>
                <div class="kpi-card"><span class="kpi-label">Total PnL (USD)</span><span class="kpi-value" data-kpi="total_pnl_usd">–</span></div>
            </div>

            <div class="filter-bar-mount" data-flt-scope="skipsloggen"></div>

            <div class="table-wrapper">
                <table class="trade-log">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Signal</th>
                            <th>Instrument</th>
                            <th>Retning</th>
                            <th>Horisont</th>
                            <th>Entry</th>
                            <th>Stop</th>
                            <th>T1</th>
                            <th>Closed</th>
                            <th>Resultat</th>
                            <th>Grunn</th>
                            <th class="align-right">PnL (USD)</th>
                        </tr>
                    </thead>
                    <tbody id="trade-log-body">
                        <tr><td colspan="12" class="empty">Laster…</td></tr>
                    </tbody>
                </table>
            </div>
            <p class="meta">Sist oppdatert: <span id="last-updated">–</span></p>
        </section>

        <!-- Fane 2: Financial setups (session 48) -->
        <section id="financial" class="tab-panel" role="tabpanel">
            <div class="setups-meta">
                <span id="financial-count">–</span> setups synlige
                (<span id="financial-total">–</span> totalt)
            </div>
            <div class="filter-bar-mount" data-flt-scope="financial"></div>
            <div id="financial-cards" class="setups-grid">
                <p class="empty">Laster…</p>
            </div>
        </section>
        <!-- Fane 3: Soft commodities (session 49) -->
        <section id="agri" class="tab-panel" role="tabpanel">
            <div class="setups-meta">
                <span id="agri-count">–</span> setups synlige
                (<span id="agri-total">–</span> totalt)
            </div>
            <div class="filter-bar-mount" data-flt-scope="agri"></div>
            <div id="agri-cards" class="setups-grid">
                <p class="empty">Laster…</p>
            </div>
        </section>
        <!-- Fane 4: Kartrommet (session 50) -->
        <section id="kartrom" class="tab-panel" role="tabpanel">
            <p class="meta">Pipeline-helse. Sist sjekket: <span id="kartrom-last-check">–</span></p>
            <div id="kartrom-groups"><p class="empty">Laster…</p></div>
        </section>
    </main>

    <script src="/assets/filter.js"></script>
    <script src="/assets/app.js"></script>
</body>
</html>
