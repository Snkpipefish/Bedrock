name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # Repoet har ikke uv.lock committed (reproducerbare builds via
          # pyproject.toml + resolver er akseptabelt her). Uten denne
          # setup-uv@v3 feiler hardt ved cache-søk på default **/uv.lock.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Pyright (types)
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -v --tb=short

      - name: Yamllint
        run: uv run yamllint config/ .github/ .pre-commit-config.yaml .yamllint.yaml
