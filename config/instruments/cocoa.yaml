# Cocoa — agri instrument (softs)
# Session 91. Ivory Coast/Ghana-dominert produksjon (~60% global).
# Agri-rules med West Africa-vær er ideelt — bruker brazil_coffee
# som proxy region inntil West Africa-region legges til weather_monthly.

inherits: family_agri

instrument:
  id: Cocoa
  asset_class: softs
  ticker: CC
  cfd_ticker: Cocoa
  yahoo_ticker: CC=F
  cot_contract: "COCOA - ICE FUTURES U.S."
  cot_report: disaggregated
  weather_region: brazil_coffee  # proxy; West Africa ikke i weather_monthly
  weather_lat: 7.5   # Côte d'Ivoire
  weather_lon: -5.5

aggregation: additive_sum
max_score: 16
min_score_publish: 6

families:
  outlook:
    weight: 5
    drivers:
      - name: seasonal_stage
        weight: 1.0
        params:
          # West Africa cocoa: main crop oct-mar (harvest), light crop
          # apr-sep. Pod-development apr-jul = yield-determinerende.
          # Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec
          monthly_scores: [0.6, 0.6, 0.6, 0.7, 0.9, 1.0, 1.0, 0.8, 0.6, 0.7, 0.8, 0.7]
  yield:
    weight: 3
    drivers:
      - name: weather_stress
        weight: 1.0
        params:
          lookback_months: 1
  weather:
    weight: 2
    drivers:
      - name: weather_stress
        weight: 1.0
        params:
          lookback_months: 1
  enso:
    weight: 2
    drivers:
      - name: enso_regime
        weight: 1.0
        params: {}
  cross:
    # Sub-fase 12.5+ session 113: bdi_chg30d → shipping_pressure med
    # eksplisitt index=BDI (Baltic-suite-rebrand).
    # Sub-fase 12.7 D2 session 133 (C3): shipping_pressure droppet for
    # Cocoa cross. West Africa-eksport (Côte d'Ivoire/Ghana ~60% global)
    # er mindre BDI-sensitiv enn grains (kakao-pris i container/break-bulk-
    # cargo, ikke dry-bulk-Baltic-indekser). dxy 0.70 → 0.85, event 0.10
    # → 0.15. Sum=1.00 per § 19.5 Del C+ måltilstand.
    # NB: Cocoa får IKKE fas_exports (USDA FAS rapporterer ikke kakao —
    # USA er marginal cocoa-importør, ikke produsent/eksportør).
    weight: 2
    drivers:
      - name: dxy_chg5d
        weight: 0.85
        params:
          bull_when: positive  # USD-styrke = lokal-valuta-svakhet = bull cocoa-eksport
          window: 5
      - name: event_distance
        weight: 0.15
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    weight: 2
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: softs, k: 5, horizon_days: 30, outcome_threshold_pct: 3.0, min_history_days: 365}
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: softs, k: 5, horizon_days: 30, min_history_days: 365}

grade_thresholds:
  A_plus: {min_score: 11, min_families_active: 4}
  A: {min_score: 8, min_families_active: 3}
  B: {min_score: 6, min_families_active: 2}
