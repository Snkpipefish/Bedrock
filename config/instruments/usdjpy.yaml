# USD/JPY — financial instrument (FX)
# Session 91. BOJ-Fed rente-differensial. JPY = funding currency.

inherits: family_financial

instrument:
  id: USDJPY
  asset_class: fx
  ticker: USDJPY
  cfd_ticker: USDJPY
  yahoo_ticker: USDJPY=X
  cot_contract: "JAPANESE YEN - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS
    # B1 D1 (sub-fase 12.7, session 129) — yield_diff_10y-input
    - IRLTLT01JPM156N  # Japan 10Y (månedlig OECD-feed)

aggregation: weighted_horizon

horizons:
  # Session 102: asymmetrisk publish-floor. Backtest (session 99): USDJPY
  # BUY-hr 22.7% vs SELL-hr 12.0% (90d) — +10.7pp BUY-bias (USD-styrke
  # via rente-spread + carry-trade). Mildere enn equity-indekser.
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 1.0, structure: 1.3, risk: 0.6, analog: 0.3}
    max_score: 4.9
    min_score_publish: {buy: 1.3, sell: 1.8}
  SWING:
    family_weights: {trend: 1.0, positioning: 1.0, macro: 1.2, structure: 1.0, risk: 0.8, analog: 0.8}
    max_score: 5.8
    min_score_publish: {buy: 2.2, sell: 2.9}
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.2, macro: 1.5, structure: 0.5, risk: 0.6, analog: 1.2}
    max_score: 5.8
    min_score_publish: {buy: 3.1, sell: 3.9}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # JPY COT-positioning er motsatt-tegn på USDJPY-pris (long JPY = bear USDJPY).
    # Calleren av signal må huske at "bull" her er JPY-bull = USDJPY-bear.
    # D1 A4+C1 (session 128): TFF (Lev Funds + Asset Mgr) erstatter legacy
    # noncomm_net_pct. cot_z_score beholdt som cross-validering.
    drivers:
      - name: positioning_lev_funds_pct
        weight: 0.40
        params: {metric: lev_funds_net_pct, lookback_weeks: 52}
      - name: positioning_asset_mgr_pct
        weight: 0.20
        params: {metric: asset_mgr_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.40
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
  macro:
    # USDJPY: lav real-yield = bear USDJPY (USD-svak). Høy VIX = risk-off
    # = JPY-styrke = bear USDJPY (invert=true).
    # B1 D1 (sub-fase 12.7, session 129): yield_diff_10y@0.35 lagt til.
    # USDJPY er invertert vs andre FX: høy diff = USD strong vs JPY = bull
    # USDJPY → bull_when=high. Sum = 1.00.
    # Sub-fase 12.10 follow-up A3 (session 142): dollar_index_breadth@0.10
    # lagt til (bunke3 #13). USDJPY er invertert vs andre FX-par —
    # bull_when=high (USD-bredde-styrke = bull USDJPY). real_yield 0.25
    # →0.20, dxy 0.30→0.25 for sum=1.00.
    drivers:
      - name: real_yield
        weight: 0.20
        params: {bull_when: high}
      - name: dxy_chg5d
        weight: 0.25
        params: {bull_when: positive, window: 5}
      - name: vix_regime
        weight: 0.10
        params: {invert: true}
      - name: yield_diff_10y
        weight: 0.35
        params: {foreign_series: IRLTLT01JPM156N, bull_when: high}  # Høy diff (US>JP) = bull USDJPY
        horizons:
          - MAKRO
      - name: dollar_index_breadth
        weight: 0.10
        params: {bull_when: high, window: 5}  # Invertert vs andre FX
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 0.7
        params: {period: 14, lookback: 252, mode: high_is_bull}
      - name: event_distance
        weight: 0.3
        params:
          countries: [USD, JPY]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: fx, k: 5, horizon_days: 30, outcome_threshold_pct: 2.0, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: fx, k: 5, horizon_days: 30, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A: {min_pct_of_max: 0.55, min_families: 3}
  B: {min_pct_of_max: 0.35, min_families: 2}
