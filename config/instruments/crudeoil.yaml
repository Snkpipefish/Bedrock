# Crude Oil (WTI) — financial instrument (energy, NEW asset class)
# Session 91: første energy-instrument. WTI er global benchmark.

inherits: family_financial

instrument:
  id: CrudeOil
  asset_class: energy
  ticker: XTIUSD
  cfd_ticker: CrudeOil
  yahoo_ticker: CL=F
  cot_contract: "CRUDE OIL, LIGHT SWEET - NEW YORK MERCANTILE EXCHANGE"
  cot_report: disaggregated
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS

aggregation: weighted_horizon

horizons:
  # Session 102: mild asymmetrisk floor. Backtest (session 99): CrudeOil
  # BUY-hr 41.7% vs SELL-hr 36.4% (90d) — +5.3pp BUY-bias (long-term
  # uptrend siden 2020-Covid-bunn). Marginal asymmetri — modest justering.
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 0.8, structure: 1.3, risk: 0.8, analog: 0.3}
    max_score: 4.9
    min_score_publish: {buy: 1.4, sell: 1.7}
  SWING:
    family_weights: {trend: 1.0, positioning: 1.2, macro: 1.0, structure: 1.0, risk: 1.0, analog: 0.6}
    max_score: 5.8
    min_score_publish: {buy: 2.3, sell: 2.8}
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.5, macro: 1.3, structure: 0.5, risk: 0.8, analog: 1.0}
    max_score: 5.9
    min_score_publish: {buy: 3.2, sell: 3.8}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # Crude COT: managed money er primær spec-driver.
    drivers:
      - name: positioning_mm_pct
        weight: 0.6
        params: {metric: mm_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.4
        params: {metric: mm_net_pct, lookback_weeks: 52}
  macro:
    # Crude: USD-priset (negativ DXY = bull). Real-yield mindre direkte.
    # VIX = geopolitisk premium → invert (høy VIX = bull pga supply-risk).
    drivers:
      - name: real_yield
        weight: 0.2
        params: {bull_when: low}
      - name: dxy_chg5d
        weight: 0.5
        params: {bull_when: negative, window: 5}
      - name: vix_regime
        weight: 0.3
        params: {invert: true}  # VIX-stress = oil supply-frykt = bull
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 1.0
        params: {period: 14, lookback: 252, mode: high_is_bull}
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: energy, k: 5, horizon_days: 30, outcome_threshold_pct: 5.0, min_history_days: 365}
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: energy, k: 5, horizon_days: 30, min_history_days: 365}

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A:      {min_pct_of_max: 0.55, min_families: 3}
  B:      {min_pct_of_max: 0.35, min_families: 2}
