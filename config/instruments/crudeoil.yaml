# Crude Oil (WTI) — financial instrument (energy, NEW asset class)
# Session 91: første energy-instrument. WTI er global benchmark.

inherits: family_financial

instrument:
  id: CrudeOil
  asset_class: energy
  ticker: XTIUSD
  cfd_ticker: CrudeOil
  yahoo_ticker: CL=F
  cot_contract: "WTI-PHYSICAL - NEW YORK MERCANTILE EXCHANGE"
  cot_report: disaggregated
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS

aggregation: weighted_horizon

horizons:
  # Session 102: mild asymmetrisk floor. Backtest (session 99): CrudeOil
  # BUY-hr 41.7% vs SELL-hr 36.4% (90d) — +5.3pp BUY-bias (long-term
  # uptrend siden 2020-Covid-bunn). Marginal asymmetri — modest justering.
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 0.8, structure: 1.3, risk: 0.8, analog: 0.3}
    max_score: 4.9
    min_score_publish: {buy: 1.4, sell: 1.7}
  SWING:
    family_weights: {trend: 1.0, positioning: 1.2, macro: 1.0, structure: 1.0, risk: 1.0, analog: 0.6}
    max_score: 5.8
    min_score_publish: {buy: 2.3, sell: 2.8}
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.5, macro: 1.3, structure: 0.5, risk: 0.8, analog: 1.0}
    max_score: 5.9
    min_score_publish: {buy: 3.2, sell: 3.8}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # Crude COT: managed money er primær spec-driver.
    # Spor F5 (2026-05-02): cot_concentration_top4 + cot_swap_dealer_skew
    # lagt til. cot_z_score 0.4→0.3 — to nye 0.05-drivere deler vekt-budsjett.
    # CRUDE OIL har historisk høy konsentrasjon (få store kommersielle hedgers
    # dominerer); top-4-konsentrasjons-spike signalerer ofte vol-regime-skift.
    drivers:
      - name: positioning_mm_pct
        weight: 0.6
        params: {metric: mm_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.3
        params: {metric: mm_net_pct, lookback_weeks: 52}
      - name: cot_concentration_top4
        weight: 0.05
        params: {contract: "WTI-PHYSICAL - NEW YORK MERCANTILE EXCHANGE"}
      - name: cot_swap_dealer_skew
        weight: 0.05
        params: {contract: "WTI-PHYSICAL - NEW YORK MERCANTILE EXCHANGE"}
  macro:
    # Crude: USD-priset (negativ DXY = bull). Real-yield mindre direkte.
    # VIX = geopolitisk premium → invert (høy VIX = bull pga supply-risk).
    # eia_stock_change = US crude oil weekly inventories — primær fundamental
    # for crude prising (sub-fase 12.5+ session 107).
    # Sub-fase 12.10 follow-up A1 (session 140): ovx_z lagt til (bunke4 #15)
    # — CBOE Crude Oil VIX z-score. Lav OVX = bull risk-on for crude
    # (option-marked-implied stabilitet). real_yield 0.15→0.10, dxy 0.35→
    # 0.25 for å holde familie-sum=1.00.
    # Sub-fase 12.10 follow-up A2 (session 141): eia_distillate_change@0.10
    # lagt til (bunke6 #22) — diesel/heating-stocks WoW-z. Distillate-build
    # = svak refinering-margin = bear crude-marginalt fordi raffinerier kan
    # senke run-rate. dxy 0.25→0.20, vix 0.20→0.15 for sum=1.00.
    # Sub-fase 12.10 follow-up A6 (session 142): eia_refinery_utilization_z
    # @0.10 lagt til (bunke6 #22). Høy refinery-utilization = sterk crude-
    # demand fra raffinerier = bull. dxy 0.20→0.15, eia_stock 0.30→0.25
    # for sum=1.00.
    # Sub-fase 12.10 follow-up A7 (session 142): eia_imports_crude@0.05 +
    # eia_petroleum_supplied@0.05 (begge bunke6 #22). Imports = US-balanse-
    # input; petroleum-supplied = total US demand. eia_stock 0.25→0.20,
    # vix 0.15→0.10 for sum=1.00.
    drivers:
      - name: real_yield
        weight: 0.10
        params: {bull_when: low}
      - name: dxy_chg5d
        weight: 0.15
        params: {bull_when: negative, window: 5}
      - name: vix_regime
        weight: 0.10
        params: {invert: true}  # VIX-stress = oil supply-frykt = bull
      - name: eia_stock_change
        weight: 0.15
        params: {series_id: WCESTUS1}  # US Crude Oil Stocks excl. SPR
      - name: ovx_z
        weight: 0.15
        params: {bull_when: low, lookback_days: 252}
      - name: eia_distillate_change
        weight: 0.10
        params: {invert: true}  # build = bear marginalt
      - name: eia_refinery_utilization_z
        weight: 0.10
        params: {}  # default invert=False (flow-metrikk: høy utilization = bullish)
      - name: eia_imports_crude
        weight: 0.05
        params: {}  # default invert=False (US-balanse: økt import = bullish)
      - name: eia_petroleum_supplied
        weight: 0.05
        params: {}  # default invert=False (total US-demand-proxy = bullish)
      # Sub-fase 12.10 follow-up A10 (session 142): eia_gasoline_demand@0.05
      # (bunke6 #22, siste EIA-driver). Gasoline-supplied (WGFUPUS2) er
      # konsumentenes demand-proxy. eia_stock 0.20→0.15 for sum=1.00.
      - name: eia_gasoline_demand
        weight: 0.05
        params: {}  # default invert=False (gasoline-demand = bullish)
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 0.7
        params: {period: 14, lookback: 252, mode: high_is_bull}
      - name: event_distance
        weight: 0.3
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: energy, k: 5, horizon_days: 30, outcome_threshold_pct: 5.0, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: energy, k: 5, horizon_days: 30, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A: {min_pct_of_max: 0.55, min_families: 3}
  B: {min_pct_of_max: 0.35, min_families: 2}
