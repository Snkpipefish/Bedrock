# Gold — financial instrument (metals)
# Referanse: PLAN § 4.2

inherits: family_financial  # ignorert i Fase 5 session 21; kommer senere

instrument:
  id: Gold
  asset_class: metals
  ticker: XAUUSD
  cfd_ticker: Gold
  yahoo_ticker: GC=F   # COMEX Gold continuous futures (samme kilde cot-explorer bruker)
  cot_contract: "GOLD - COMMODITY EXCHANGE INC."
  cot_report: disaggregated
  fred_series_ids:
    - DGS10    # 10Y nominal treasury yield (real-yield-driver)
    - T10YIE   # 10Y inflation expectation — DGS10 minus T10YIE = real yield
    - DTWEXBGS # broad dollar index (dxy_chg5d-driver)
    - VIXCLS   # VIX (vix_regime-driver, macro risk-regime)

aggregation: weighted_horizon

horizons:
  SCALP:
    family_weights:
      trend: 1.2
      positioning: 0.5
      macro: 0.7
      structure: 1.3
      risk: 0.8
      analog: 0.3   # K-NN er svakt nyttig på scalp-tidsskala
    max_score: 4.8
    min_score_publish: 1.5
  SWING:
    family_weights:
      trend: 1.0
      positioning: 1.0
      macro: 1.0
      structure: 1.0
      risk: 1.0
      analog: 0.8   # K-NN passer bra på swing
    max_score: 5.8
    min_score_publish: 2.5
  MAKRO:
    family_weights:
      trend: 0.8
      positioning: 1.3
      macro: 1.3
      structure: 0.5
      risk: 0.8
      analog: 1.2   # K-NN er sterkest på makro-historikk
    max_score: 5.9
    min_score_publish: 3.5

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    drivers:
      # Sub-fase 12.5 session 70: ekte positioning-drivere fra COT.
      # Bruker MM net % av OI for å unngå scale-bias når OI varierer.
      - name: positioning_mm_pct
        weight: 0.6
        params:
          metric: mm_net_pct
          lookback_weeks: 52
      - name: cot_z_score
        weight: 0.4
        params:
          metric: mm_net_pct
          lookback_weeks: 52
  macro:
    # Sub-fase 12.5 session 71: ekte macro-drivere fra FRED.
    # Gold som ikke-rentebærende metall får støtte når real-yield faller,
    # USD svekkes, og når VIX viser stress (safe-haven via invert=true).
    drivers:
      - name: real_yield
        weight: 0.4
        params:
          bull_when: low   # låg/negativ real yield = bull for Gold
      - name: dxy_chg5d
        weight: 0.4
        params:
          bull_when: negative  # USD-svakhet = bull for Gold
          window: 5
      - name: vix_regime
        weight: 0.2
        params:
          invert: true  # Gold er safe-haven; høy VIX er bull
  structure:
    # Sub-fase 12.5 Block A polish session 79: range_position erstatter
    # sma200_align (sma er trend, ikke structure). 20-dagers range-posisjon
    # er klassisk struktur-mål: nær top = trend-continuation.
    drivers:
      - name: range_position
        weight: 1.0
        params:
          window: 20
          mode: continuation
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    # Sub-fase 12.5 Block A polish session 79: vol_regime erstatter
    # sma200_align (sma har null risk-info). ATR(14)-percentil over 252
    # dager. Høy vol = trade-friendly miljø (trend-tolkning).
    drivers:
      - name: vol_regime
        weight: 1.0
        params:
          period: 14
          lookback: 252
          mode: high_is_bull
  analog:
    # K-NN over historiske dim-verdier per § 6.5 (Fase 10 ADR-005).
    # Bruker dim som faktisk er backfilt: real_yield, dxy, cot mm-pct.
    # vix_regime mangler enda (egen fetcher når VIX legges til).
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: metals
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: metals
          k: 5
          horizon_days: 30
          min_history_days: 365

grade_thresholds:
  A_plus:
    min_pct_of_max: 0.75
    min_families: 4
  A:
    min_pct_of_max: 0.55
    min_families: 3
  B:
    min_pct_of_max: 0.35
    min_families: 2
