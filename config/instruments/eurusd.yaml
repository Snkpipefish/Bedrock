# EUR/USD — financial instrument (FX)
# Sub-fase 12.5+ session 81: 9. instrument. FX-asset-class første eksempel.

inherits: family_financial

instrument:
  id: EURUSD
  asset_class: fx
  ticker: EURUSD
  cfd_ticker: EURUSD
  yahoo_ticker: EURUSD=X
  cot_contract: "EURO FX - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS

aggregation: weighted_horizon

horizons:
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 1.0, structure: 1.3, risk: 0.6, analog: 0.3}
    max_score: 4.9
    min_score_publish: 1.5
  SWING:
    family_weights: {trend: 1.0, positioning: 1.0, macro: 1.2, structure: 1.0, risk: 0.8, analog: 0.8}
    max_score: 5.8
    min_score_publish: 2.5
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.2, macro: 1.5, structure: 0.5, risk: 0.6, analog: 1.2}
    max_score: 5.8
    min_score_publish: 3.5

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # EUR FX-COT: large speculators (noncomm) er primær spec-metric.
    drivers:
      - name: positioning_mm_pct
        weight: 0.6
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.4
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
  macro:
    # EURUSD-tolkning: EUR styrker når USD svekkes (negativ DXY = bull EURUSD).
    # Real yield: lav yield støtter ikke-USD-valutaer.
    # VIX: høy vol typisk bear EUR (flight-to-USD).
    drivers:
      - name: real_yield
        weight: 0.4
        params: {bull_when: low}  # Lav real yield = bull EUR (vs USD)
      - name: dxy_chg5d
        weight: 0.5
        params: {bull_when: negative, window: 5}  # USD svakt = bull EURUSD
      - name: vix_regime
        weight: 0.1
        params: {invert: false}  # Lav VIX = risk-on = bull EUR (mild effekt)
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 1.0
        params: {period: 14, lookback: 252, mode: high_is_bull}
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: fx, k: 5, horizon_days: 30, outcome_threshold_pct: 2.0, min_history_days: 365}
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: fx, k: 5, horizon_days: 30, min_history_days: 365}

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A:      {min_pct_of_max: 0.55, min_families: 3}
  B:      {min_pct_of_max: 0.35, min_families: 2}
