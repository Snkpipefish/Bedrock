# Silver — financial instrument (metals)
# Session 91: tatt inn som 12. instrument. Følger Gold-mønster med samme
# macro/positioning-drivere men egne max_score-thresholds.

inherits: family_financial

instrument:
  id: Silver
  asset_class: metals
  ticker: XAGUSD
  cfd_ticker: Silver
  yahoo_ticker: SI=F
  cot_contract: "SILVER - COMMODITY EXCHANGE INC."
  cot_report: disaggregated
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS

aggregation: weighted_horizon

horizons:
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 0.7, structure: 1.3, risk: 0.8, analog: 0.3}
    max_score: 4.8
    min_score_publish: 1.5
  SWING:
    family_weights: {trend: 1.0, positioning: 1.0, macro: 1.0, structure: 1.0, risk: 1.0, analog: 0.8}
    max_score: 5.8
    min_score_publish: 2.5
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.3, macro: 1.3, structure: 0.5, risk: 0.8, analog: 1.2}
    max_score: 5.9
    min_score_publish: 3.5

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    drivers:
      - name: positioning_mm_pct
        weight: 0.6
        params: {metric: mm_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.4
        params: {metric: mm_net_pct, lookback_weeks: 52}
  macro:
    # Silver: like Gold men mer industriell — også føler igjennom på
    # vekstbekymring. Real-yield-følsomhet mindre enn Gold (vekt 0.15 vs Gold
    # 0.30). Sub-fase 12.5+ session 108 + 109: comex_stress + mining_disruption
    # (Mexico 23 % + Chile/Peru 18 %).
    # Sub-fase 12.7 D2 A6 (session 132): etf_holdings_change@0.20 lagt til —
    # iShares Silver (SLV) shares_outstanding-WoW som proxy for tonnes (SLV-
    # feed mangler tonnes; expense-ratio-decay ~0.5 %/år neglisjerbar på
    # WoW/MoM-skala). Vekter omfordelt til § 19.5 Del C+ måltilstand:
    # real_yield 0.15 + dxy 0.25 + vix 0.10 + comex 0.20 + mining 0.10 +
    # etf 0.20 = 1.00.
    # Sub-fase 12.6 (session 138): real_yield 0.15→0.20 — sterk
    # instrument-spesifikk signal (median |IC|=0.382 for Silver 90d).
    # vix_regime trimmet 0.10→0.05 for å holde familie-sum=1.00.
    drivers:
      - name: real_yield
        weight: 0.20
        params: {bull_when: low}
      - name: dxy_chg5d
        weight: 0.25
        params: {bull_when: negative, window: 5}
      - name: vix_regime
        weight: 0.05
        params: {invert: true}
      - name: comex_stress
        weight: 0.2
        params: {metal: silver, wow_window: 5}
      - name: mining_disruption
        weight: 0.1
        params: {metal: silver, lookback_days: 7}
      - name: etf_holdings_change
        weight: 0.2
        params: {ticker: slv, bull_when: high, wow_window: 5}
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 0.7
        params: {period: 14, lookback: 252, mode: high_is_bull}
      - name: event_distance
        weight: 0.3
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: metals, k: 5, horizon_days: 30, outcome_threshold_pct: 3.0, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: metals, k: 5, horizon_days: 30, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A: {min_pct_of_max: 0.55, min_families: 3}
  B: {min_pct_of_max: 0.35, min_families: 2}
