# Bitcoin — financial instrument (crypto)
# Sub-fase 12.5+ session 82: 11. instrument, første crypto-asset-class.
# CME Bitcoin futures startet 2017-12; COT-historikk derfor kortere
# enn andre instrumenter. Pris-historikk fra 2014.

inherits: family_financial

instrument:
  id: BTC
  asset_class: crypto
  ticker: BTC
  cfd_ticker: BTC
  yahoo_ticker: BTC-USD
  cot_contract: "BITCOIN - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS
    # B1 D1 (sub-fase 12.7, session 129) — credit_spread_change + nfci_change
    # + net_fed_liq_change-input. Erstatter HY/IG OAS som ga 3y-historikk.
    - AAA10Y       # Moody's AAA Corporate spread vs 10Y Treasury
    - BAA10Y       # Moody's BAA Corporate spread vs 10Y Treasury
    - NFCI         # Chicago Fed National Financial Conditions Index
    - WALCL        # Fed Total Assets (NetFedLiq input 1)
    - RRPONTSYD    # Reverse Repo outstanding (NetFedLiq input 2)
    - WTREGEN      # Treasury General Account (NetFedLiq input 3)

aggregation: weighted_horizon

horizons:
  SCALP:
    family_weights: {trend: 1.5, positioning: 0.4, macro: 0.5, structure: 1.4, risk: 0.7, analog: 0.3}
    max_score: 4.8
    min_score_publish: 1.5
  SWING:
    family_weights: {trend: 1.2, positioning: 0.8, macro: 0.7, structure: 1.0, risk: 1.0, analog: 0.7}
    max_score: 5.4
    min_score_publish: 2.5
  MAKRO:
    family_weights: {trend: 1.0, positioning: 1.0, macro: 1.0, structure: 0.5, risk: 0.8, analog: 1.2}
    max_score: 5.5
    min_score_publish: 3.0

families:
  trend:
    # BTC er trend-tungt asset; trend-familien dominerer SCALP/SWING.
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # CME BTC TFF-historikk fra 2018-04 (kortere enn FX). 52-uke lookback
    # holder for begge typer (lev_funds + asset_mgr).
    # D1 A4+C1 (session 128): TFF (Lev Funds + Asset Mgr) erstatter
    # legacy noncomm_net_pct. Se eurusd.yaml for full kontekst.
    drivers:
      - name: positioning_lev_funds_pct
        weight: 0.40
        params: {metric: lev_funds_net_pct, lookback_weeks: 52}
      - name: positioning_asset_mgr_pct
        weight: 0.20
        params: {metric: asset_mgr_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.40
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
  macro:
    # BTC-tolkning: lav real yield = bull (alt-asset i lav-rente-miljø);
    # USD-svakhet = bull (BTC priset i USD); lav VIX = bull (risk-on).
    # B1 D1 (sub-fase 12.7, session 129): net_fed_liq_change@0.30 +
    # nfci_change@0.20 lagt til. NetFedLiq tyngst-vektet for crypto
    # (empirisk meget likviditets-sensitiv, særlig i 2020-2022).
    # Sum = 1.00.
    # Sub-fase 12.10 follow-up A5 (session 142): m2_yoy@0.10 lagt til
    # (bunke3 #11). Crypto er empirisk meget M2-likviditets-sensitiv —
    # 2020-21 bull-fasen er klassisk M2-impuls-eksempel. real_yield 0.20→
    # 0.15, dxy 0.20→0.15 for sum=1.00.
    drivers:
      - name: real_yield
        weight: 0.15
        params: {bull_when: low}
      - name: dxy_chg5d
        weight: 0.15
        params: {bull_when: negative, window: 5}
      - name: vix_regime
        weight: 0.10
        params: {invert: false}
      - name: net_fed_liq_change
        weight: 0.30
        params: {bull_when: high}
        horizons:
          - MAKRO
      # Sub-fase 12.10 follow-up A10 (session 142): nfci_change → anfci_z
      # (§ 22.2 #11). Samme weight + bull_when.
      - name: anfci_z
        weight: 0.20
        params: {bull_when: low}
        horizons:
          - MAKRO
      - name: m2_yoy
        weight: 0.10
        params: {bull_when: high}
        horizons:
          - MAKRO
  structure:
    # 20-dagers range-position fungerer bra på BTC også — høy volatilitet
    # gjør range-bredder dynamiske, men relative posisjonen er meningsfull.
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    # BTC har inherent høy vol; kalibrer lookback til 252 dager som
    # fanger både bull- og bear-regimer.
    # B1 D1 (sub-fase 12.7, session 129): credit_spread_change@0.25 lagt
    # til — crypto er empirisk korrelert med credit-stress (2022).
    drivers:
      - name: vol_regime
        weight: 0.55
        params: {period: 14, lookback: 252, mode: high_is_bull}
      - name: event_distance
        weight: 0.20
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
      - name: credit_spread_change
        weight: 0.25
        params: {bull_when: low}
        horizons:
          - MAKRO
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: crypto, k: 5, horizon_days: 30, outcome_threshold_pct: 5.0, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: crypto, k: 5, horizon_days: 30, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A: {min_pct_of_max: 0.55, min_families: 3}
  B: {min_pct_of_max: 0.35, min_families: 2}
