# Wheat — agri instrument (grains)
# Sub-fase 12.5 Block C session 75. CBOT SRW-wheat (default).
# Bruker us_great_plains for vinterhvete (Kansas/Oklahoma).

inherits: family_agri

instrument:
  id: Wheat
  asset_class: grains
  ticker: ZW
  cfd_ticker: Wheat
  yahoo_ticker: ZW=F
  cot_contract: "WHEAT-SRW - CHICAGO BOARD OF TRADE"
  cot_report: disaggregated
  weather_region: us_great_plains
  weather_lat: 38.0  # mid-Kansas
  weather_lon: -98.0

aggregation: additive_sum
max_score: 16
min_score_publish: 6

families:
  outlook:
    weight: 5
    drivers:
      - name: seasonal_stage
        weight: 1.0
        params:
          # US Winter Wheat (HRW/SRW): planting Sep-Oct, dormant
          # Nov-Feb, jointing Mar, heading Apr, filling May, harvest
          # Jun-Jul.
          # Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec
          monthly_scores: [0.4, 0.4, 0.7, 0.9, 1.0, 0.8, 0.5, 0.3, 0.6, 0.6, 0.5, 0.4]
        horizons:
          - MAKRO
  yield:
    # Session 98: utvidet med crop_progress_stage (NASS GOOD/EXCELLENT).
    # Vekter:
    # - weather_stress 20% (forward-looking)
    # - crop_progress_stage 20% (USDA ukentlig observert, samme domene)
    # - wasde_s2u_change 40% (autoritativ S2U)
    # - disease_pressure 10% (stripe rust, locust)
    # - export_event_active 10% (Ukraine corridor, India ban)
    weight: 3
    drivers:
      - name: weather_stress
        weight: 0.2
        params:
          lookback_months: 1
        horizons: &id001
          - MAKRO
          - SWING
      - name: crop_progress_stage
        weight: 0.2
        params:
          metric: GOOD_EXCELLENT
          mode: low_is_bull
        horizons:
          - MAKRO
          - SWING
      - name: wasde_s2u_change
        weight: 0.4
        params:
          region: US
        horizons:
          - MAKRO
          - SWING
      - name: disease_pressure
        weight: 0.1
        params:
          lookback_days: 90
      - name: export_event_active
        weight: 0.1
        params:
          lookback_days: 60
  weather:
    # Sub-fase 12.7 D2 session 133 (A9): drought_monitor lagt til @ 0.45.
    # USDM ukentlig D2+ andel co-driver med weather_stress. Sum=1.00 per
    # § 19.5 Del C+ måltilstand. (NB: us_great_plains-region, men USDM-
    # CONUS-aggregat er proxy — per-state IL/KS-utvidelse i Plan-S.)
    weight: 2
    drivers:
      - name: weather_stress
        weight: 0.55
        params:
          lookback_months: 1
        horizons: *id001
      - name: drought_monitor
        weight: 0.45
        params:
          aoi: us
          metric: d2_pct
          bull_when: high
        horizons:
          - MAKRO
          - SWING
  enso:
    # Wheat US-plains: La Niña gir tørrere = bull (lavere yield).
    weight: 2
    drivers:
      - name: noaa_oni_index
        weight: 1.0
        params: {}
        horizons:
          - MAKRO
  cross:
    # Sub-fase 12.5+ session 90: utvidet med bdi_chg30d (shipping).
    # Wheat-eksport (US #2 globalt) er sensitiv til både USD og BDI.
    # Sub-fase 12.5+ session 110: cot_euronext_mm_pct lagt til —
    # EU-overlay (Euronext Milling Wheat MiFID II MM-positioning).
    # 0.2 vekt — sekundær til DXY men gir cross-region-validering.
    # Sub-fase 12.5+ session 113: bdi_chg30d → shipping_pressure med
    # eksplisitt index=BDI (Baltic-suite-rebrand).
    # Sub-fase 12.10 Bunke 2 #4: cot_ice_mm_pct@0.15 lagt til. ICE Wheat
    # Futures (UK Feed Wheat, ICE Europe) gir et tredje cross-region
    # positioning-signal (US CFTC + EU Euronext + UK ICE).
    # dxy 0.40 → 0.30, shipping 0.15 → 0.10. Sum=1.00.
    weight: 2
    drivers:
      - name: dxy_chg5d
        weight: 0.30
        params:
          bull_when: negative
          window: 5
      - name: shipping_pressure
        weight: 0.10
        params:
          index: BDI
          window_days: 30
          bull_when: negative
      - name: event_distance
        weight: 0.10
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
      - name: cot_euronext_mm_pct
        weight: 0.20
        params:
          contract: euronext milling wheat
          metric: mm_net_pct
          lookback_weeks: 52
      - name: cot_ice_mm_pct
        weight: 0.15
        params:
          contract: ice wheat
          metric: mm_net_pct
          lookback_weeks: 52
      - name: fas_exports
        weight: 0.15
        params:
          bull_when: high
        horizons:
          - MAKRO
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    weight: 2
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          min_history_days: 365

        horizons:
          - MAKRO
          - SWING
grade_thresholds:
  A_plus: {min_score: 11, min_families_active: 4}
  A: {min_score: 8, min_families_active: 3}
  B: {min_score: 6, min_families_active: 2}
