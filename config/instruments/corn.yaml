# Corn — agri instrument (grains)
# Referanse: PLAN § 4.3

inherits: family_agri  # ignorert i Fase 5 session 21

instrument:
  id: Corn
  asset_class: grains
  ticker: ZC
  cfd_ticker: Corn
  yahoo_ticker: ZC=F   # CBOT Corn continuous futures
  cot_contract: "CORN - CHICAGO BOARD OF TRADE"
  cot_report: disaggregated
  weather_region: us_cornbelt
  weather_lat: 40.75
  weather_lon: -96.75

aggregation: additive_sum
max_score: 20   # var 18, +2 for analog-familien
min_score_publish: 7

families:
  outlook:
    # Sub-fase 12.5 session 74: seasonal_stage erstatter sma200_align.
    # Default-kalender (NH grains): apr-jul vekst-aktiv, oct-mar low-signal.
    weight: 5
    drivers:
      - name: seasonal_stage
        weight: 1.0
        params: {}  # bruker default NH-grain-kalender
  yield:
    # Yield-forventning drives av samme weather-stress-data som weather-
    # familien, men weight i denne familien (3) reflekterer at yield er
    # forward-looking mens weather er current-state.
    weight: 3
    drivers:
      - name: weather_stress
        weight: 1.0
        params:
          lookback_months: 1
  weather:
    # Sub-fase 12.5 session 72: ekte vær-stress-driver fra weather_monthly.
    # Høy stress (varmt + tørt + vann-underskudd) er bull for Corn (lavere
    # yield-forventning → høyere pris).
    weight: 2
    drivers:
      - name: weather_stress
        weight: 1.0
        params:
          lookback_months: 1
  enso:
    # ENSO-regime fra NOAA ONI. La Niña gir typisk US-drought-risk
    # for us_cornbelt → bull for Corn (default-mapping).
    weight: 2
    drivers:
      - name: enso_regime
        weight: 1.0
        params: {}
  conab:
    # PLACEHOLDER: Conab-fetcher (Brazil agri ministry) er ikke
    # implementert ennå. Familien beholdes for fremtidig conab_yoy-
    # driver, men sma200_align gir trend-leak. Vurder å sette
    # weight: 0 eller fjerne familien helt før Fase 13 cutover hvis
    # Conab-fetcher fortsatt ikke er bygget.
    weight: 2
    drivers:
      - {name: sma200_align, weight: 1.0, params: {tf: D1}}
  cross:
    # USD-styrke er bear for Corn (US-eksport blir dyrere globalt).
    # dxy_chg5d med bull_when=negative gir høy score når USD svekkes.
    weight: 2
    drivers:
      - name: dxy_chg5d
        weight: 1.0
        params:
          bull_when: negative
          window: 5
  analog:
    weight: 2
    # K-NN per § 6.5 grains: weather_stress + enso + dxy_chg5d
    # (conab_yoy mangler kilde, hoppes over via skip_missing).
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          min_history_days: 365

grade_thresholds:
  A_plus:
    min_score: 14
    min_families_active: 4
  A:
    min_score: 10
    min_families_active: 3
  B:
    min_score: 7
    min_families_active: 2

# usda_blackout: ignorert i session 21, kommer med kalender-integrering
