# Corn — agri instrument (grains)
# Referanse: PLAN § 4.3

inherits: family_agri  # ignorert i Fase 5 session 21

instrument:
  id: Corn
  asset_class: grains
  ticker: ZC
  cfd_ticker: Corn
  yahoo_ticker: ZC=F   # CBOT Corn continuous futures
  cot_contract: "CORN - CHICAGO BOARD OF TRADE"
  cot_report: disaggregated
  weather_region: us_cornbelt
  weather_lat: 40.75
  weather_lon: -96.75

aggregation: additive_sum
max_score: 20   # var 18, +2 for analog-familien
min_score_publish: 7

families:
  outlook:
    # Sub-fase 12.5 session 74: seasonal_stage erstatter sma200_align.
    # Default-kalender (NH grains): apr-jul vekst-aktiv, oct-mar low-signal.
    weight: 5
    drivers:
      - name: seasonal_stage
        weight: 1.0
        params: {}  # bruker default NH-grain-kalender
        horizons:
          - MAKRO
  yield:
    # Yield-forventning drives av weather_stress (månedlig miljø) +
    # crop_progress_stage (ukentlig USDA-rapport, GOOD/EXCELLENT-pct).
    # Session 98: NASS-data live etter session 97. Lav GOOD_EXCELLENT
    # er bullish (yield-risk) per default-mode `low_is_bull`.
    weight: 3
    drivers:
      - name: weather_stress
        weight: 0.5
        params:
          lookback_months: 1
        horizons: &id001
          - MAKRO
          - SWING
      - name: crop_progress_stage
        weight: 0.5
        params:
          metric: GOOD_EXCELLENT
          mode: low_is_bull
        horizons:
          - MAKRO
          - SWING
  weather:
    # Sub-fase 12.5 session 72: ekte vær-stress-driver fra weather_monthly.
    # Høy stress (varmt + tørt + vann-underskudd) er bull for Corn (lavere
    # yield-forventning → høyere pris).
    # Sub-fase 12.7 D2 session 133 (A9): drought_monitor lagt til @ 0.45.
    # USDM ukentlig D2+ andel — fungerer som co-driver med weather_stress
    # (månedlig) for å fange ukentlig drought-utvikling. weather_stress
    # 1.00 → 0.55 per § 19.5 Del C+ måltilstand. Sum=1.00.
    weight: 2
    drivers:
      - name: weather_stress
        weight: 0.55
        params:
          lookback_months: 1
        horizons: *id001
      - name: drought_monitor
        weight: 0.45
        params:
          aoi: us
          metric: d2_pct
          bull_when: high
        horizons:
          - MAKRO
          - SWING
  enso:
    # ENSO-regime fra NOAA ONI. La Niña gir typisk US-drought-risk
    # for us_cornbelt → bull for Corn (default-mapping).
    weight: 2
    drivers:
      - name: enso_regime
        weight: 1.0
        params: {}
        horizons:
          - MAKRO
  conab:
    # Sub-fase 12.5+ session 86: brukte wasde_s2u_change som placeholder
    # inntil Conab var implementert. Sub-fase 12.5+ session 111: ekte
    # conab_yoy lagt til. WASDE forblir primær (US ~30% global, Brasil
    # ~10%); Conab supplerer for Brazil-spesifikk supply-status.
    weight: 2
    drivers:
      - name: wasde_s2u_change
        weight: 0.7
        params:
          region: US
        horizons:
          - MAKRO
          - SWING
      - name: conab_yoy
        weight: 0.3
        params:
          commodity: milho
        horizons:
          - MAKRO
  cross:
    # Sub-fase 12.5+ session 90: utvidet med bdi_chg30d (shipping-
    # kostnad). USD-svakhet OG BDI ned begge bull for US-eksport-flyt.
    # Sub-fase 12.5+ session 110: cot_euronext_mm_pct lagt til —
    # EU-overlay (Euronext Corn EMA MiFID II MM-positioning).
    # NB: Euronext Corn er mye mindre likvid enn US-CBOT (~38K OI
    # vs >2M for CBOT). Settes lav vekt 0.15 — ren cross-region-
    # spec-signal, ikke primær.
    # Sub-fase 12.5+ session 113: bdi_chg30d → shipping_pressure med
    # eksplisitt index=BDI (Baltic-suite-rebrand).
    # Sub-fase 12.7 D2 session 133 (A3): fas_exports lagt til @ 0.15.
    # USDA FAS ESR ukentlig us-eksport-demand-signal (USA = marginal
    # tilbud globalt). dxy 0.55 → 0.45, shipping 0.20 → 0.15. Sum=1.00
    # per § 19.5 Del C+ måltilstand.
    weight: 2
    drivers:
      - name: dxy_chg5d
        weight: 0.45
        params:
          bull_when: negative
          window: 5
      - name: shipping_pressure
        weight: 0.15
        params:
          index: BDI
          window_days: 30
          bull_when: negative
      - name: event_distance
        weight: 0.1
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
      - name: cot_euronext_mm_pct
        weight: 0.15
        params:
          contract: euronext corn
          metric: mm_net_pct
          lookback_weeks: 52
      - name: fas_exports
        weight: 0.15
        params:
          bull_when: high
        horizons:
          - MAKRO
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    weight: 2
    # K-NN per § 6.5 grains: weather_stress + enso + dxy_chg5d
    # (conab_yoy mangler kilde, hoppes over via skip_missing).
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          min_history_days: 365

        horizons:
          - MAKRO
          - SWING
grade_thresholds:
  A_plus:
    min_score: 14
    min_families_active: 4
  A:
    min_score: 10
    min_families_active: 3
  B:
    min_score: 7
    min_families_active: 2

# usda_blackout: ignorert i session 21, kommer med kalender-integrering
