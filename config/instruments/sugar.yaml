# Sugar — agri instrument (softs)
# Sub-fase 12.5 Block C session 75. Brazilian sugarcane (~40 % global
# produksjon). Zafra (harvest) Apr-Nov, dvs supply-pressure i den
# perioden — pris-sensitivitet høy.

inherits: family_agri

instrument:
  id: Sugar
  asset_class: softs
  ticker: SB
  cfd_ticker: Sugar
  yahoo_ticker: SB=F
  cot_contract: "SUGAR NO. 11 - ICE FUTURES U.S."
  cot_report: disaggregated
  # Sub-fase 12.11+: brazil_centro_sul backfilled via Open-Meteo
  # Archive (Ribeirão Preto SP, hjertet av sukker-belte). 184 mnd
  # 2011-01 → 2026-04. Erstatter mais-region brazil_mato_grosso som
  # ikke matchet sukker-region.
  weather_region: brazil_centro_sul
  weather_lat: -21.18
  weather_lon: -47.81

aggregation: additive_sum
# Sub-fase 12.11+: UNICA-familien midlertidig nedvektet til 0 fordi
# database har kun 1 historisk rapport (UNICA-arkivet er ikke offentlig
# tilgjengelig — kun løpende fetcher kan akkumulere). Re-aktiveres til
# vekt 2 når ≥26 rapporter (≈1 år) er samlet og driver-terskler kan
# kalibreres mot reell historikk. Total max_score: 16 - 2 = 14.
max_score: 14
# Session 102: invertert asymmetrisk floor. Backtest (session 99):
# Sugar BUY-hr 34.9% vs SELL-hr 45.0% (90d) — -10.1pp **SELL-bias**.
# Eneste agri med strukturell SELL-bias (Brazil over-supply + global
# substitusjon til HFCS). BUY-floor strenger, SELL lavere.
min_score_publish: {buy: 7, sell: 5}

families:
  outlook:
    weight: 5
    drivers:
      - name: seasonal_stage
        weight: 1.0
        params:
          # Brazilian sugarcane: zafra Apr-Nov (harvest, supply-fokus),
          # entressafra Dec-Mar (growing, yield-fokus).
          # Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec
          monthly_scores: [0.7, 0.7, 0.8, 0.9, 1.0, 1.0, 1.0, 1.0, 0.9, 0.7, 0.6, 0.6]
        horizons:
          - MAKRO
  yield:
    # Sub-fase 12.5+ session 86: kombinerer vær-stress (50%) + USDA
    # WASDE S2U (50%). US sugar-produksjon er liten globalt, men
    # WASDE rapporterer US-balanse + benchmark.
    weight: 3
    drivers:
      - name: weather_stress
        weight: 0.5
        params:
          lookback_months: 1
        horizons: &id001
          - MAKRO
          - SWING
      - name: wasde_s2u_change
        weight: 0.5
        params:
          region: US
        horizons:
          - MAKRO
          - SWING
  positioning:
    # Sub-fase 12.11: erstatter ren-dobbel-talt weather-familie med
    # COT-positioning-signal. 3 ortogonale metrics — se cocoa.yaml.
    weight: 2
    drivers:
      - name: positioning_mm_pct
        weight: 0.40
        params: {}
        horizons:
          - MAKRO
          - SWING
      - name: cot_oi_change
        weight: 0.35
        params:
          contract: "SUGAR NO. 11 - ICE FUTURES U.S."
          report: disaggregated
        horizons:
          - MAKRO
          - SWING
      - name: cot_swap_dealer_skew
        weight: 0.25
        params:
          contract: "SUGAR NO. 11 - ICE FUTURES U.S."
          report: disaggregated
        horizons:
          - MAKRO
          - SWING
  enso:
    # Sugar/Brasil: La Niña gir typisk våtere SE-Brazil = mindre
    # bra for høst (regnete dager forsinker zafra) = bull.
    # Spor F4 (2026-05-02): noaa_enso_forecast_3mo lagt til som
    # forward-overlay (IRI Plumes 3-mnd-prognose). 0.6/0.4 split —
    # current ONI primær, forecast som strategisk forward-bias.
    weight: 2
    drivers:
      - name: noaa_oni_index
        weight: 0.6
        params: {}
        horizons:
          - MAKRO
      - name: noaa_enso_forecast_3mo
        weight: 0.4
        params: {}
        horizons:
          - MAKRO
  unica:
    # Sub-fase 12.5+ session 112: UNICA Centro-Sul halvmånedlig
    # sukker/etanol-rapport. Brazil er ~40% global sukker-produksjon
    # — DOMINANT. Dual-driver: sugar_production_yoy (akkumulert YoY)
    # + mix_sugar_pct (current sukker-mix-prosent, lav = etanol-tilt =
    # bullish). Sub-vekter 0.6/0.4 — production_yoy er tyngre
    # fundamental.
    #
    # MIDLERTIDIG NEDVEKTET (weight: 0): kun 1 rapport i db, ikke nok
    # til å beregne YoY-z-scores. Reaktiveres når historikk bygges via
    # løpende fetcher. Driverne beholdes som referanse.
    weight: 0
    drivers:
      - name: unica_change
        weight: 0.6
        params:
          metric: sugar_production_yoy
      - name: unica_change
        weight: 0.4
        params:
          metric: mix_sugar_pct
  cross:
    # Sub-fase 12.5+ session 80: erstattet DXY-proxy med direkte BRL-
    # måling via DEXBZUS. USDBRL UP = BRL svakhet = bull for sukker-
    # eksport (Brasil ~40% global sukker-produksjon).
    # Sub-fase 12.10 Bunke 2 #4: cot_ice_mm_pct@0.25 lagt til. ICE
    # White Sugar (Europe, refined) MM-positioning gir cross-region-
    # signal til NY Sugar No.11 (raw). White-raw spread er stabil
    # nok til at MM-positioning-retning korrelerer.
    # Sub-fase 12.11: crude_oil-momentum lagt til@0.20. Brasil-
    # sukker har direkte avhengighet til oljepris via ethanol-mix-
    # ratio (Petrobras-bensin-pris styrer cane-allocation sukker vs
    # ethanol). Høy oljepris = mer ethanol-attraktivt = mindre
    # sukker = bullish sukker-pris. Reaktiv mix-respons fanges via
    # unica.unica_change.mix_sugar_pct, men prediktiv katalysator
    # mangler. Bruker momentum_z med instrument-override =
    # CrudeOil (gjenbruk eksisterende driver, ingen ny kode).
    # brl_chg5d 0.65 → 0.50, cot_ice_mm_pct 0.25 → 0.20, event 0.10
    # uendret, crude_momentum 0.20. Sum=1.00.
    weight: 2
    drivers:
      - name: brl_chg5d
        weight: 0.50
        params:
          bull_when: positive
          window: 5
      - name: event_distance
        weight: 0.10
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SWING
      - name: cot_ice_mm_pct
        weight: 0.20
        params:
          contract: ice sugar
          metric: mm_net_pct
          lookback_weeks: 52
      - name: momentum_z
        weight: 0.20
        params:
          instrument: CrudeOil
          window: 20
          tf: D1
        horizons:
          - SWING
          - MAKRO
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    weight: 2
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: softs
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: softs
          k: 5
          horizon_days: 30
          min_history_days: 365

        horizons:
          - MAKRO
          - SWING
grade_thresholds:
  # Justert for max_score 14 (UNICA midlertidig nedvektet). Beholder
  # samme prosentvise terskler som før: A+ ≈ 70%, A ≈ 50%, B ≈ 38%.
  A_plus: {min_score: 10, min_families_active: 4}
  A: {min_score: 7, min_families_active: 3}
  B: {min_score: 5, min_families_active: 2}
