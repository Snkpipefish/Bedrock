# Nasdaq — financial instrument (indices)
# Sub-fase 12.5+ session 80: 8. instrument, 7. felles signal vs cot-explorer
# (cot-explorer's eneste financial signal er Nasdaq).

inherits: family_financial

instrument:
  id: Nasdaq
  asset_class: indices
  ticker: NQ
  cfd_ticker: NAS100
  yahoo_ticker: NQ=F  # E-mini Nasdaq-100 continuous
  cot_contract: "NASDAQ-100 Consolidated - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy   # Indekser har kun legacy-rapport (ingen disaggregated)
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS

aggregation: weighted_horizon

# Vekter speiler Gold-mønsteret; SCALP foretrekker structure (intraday-
# nivåer), MAKRO foretrekker positioning + macro (regime). Equity-
# spesifikt: macro-vekt litt høyere enn metals fordi rente-følsomheten
# er sterkere på indekser.
horizons:
  SCALP:
    family_weights:
      trend: 1.2
      positioning: 0.5
      macro: 0.8
      structure: 1.3
      risk: 0.8
      analog: 0.3
    max_score: 4.9
    # Session 101: asymmetrisk floor. Backtest (session 99): Nasdaq
    # BUY-hit-rate 59.7% vs SELL 11.5% (90d) — sterkeste BUY-bias av
    # alle whitelist-instrumenter. Strenger SELL-floor enn SP500.
    min_score_publish: {buy: 1.3, sell: 2.2}
  SWING:
    family_weights:
      trend: 1.0
      positioning: 1.0
      macro: 1.0
      structure: 1.0
      risk: 1.0
      analog: 0.8
    max_score: 5.8
    min_score_publish: {buy: 2.0, sell: 3.4}
  MAKRO:
    family_weights:
      trend: 0.8
      positioning: 1.2
      macro: 1.4
      structure: 0.5
      risk: 0.8
      analog: 1.2
    max_score: 5.9
    min_score_publish: {buy: 3.0, sell: 4.7}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # Legacy COT bruker noncomm (large specs) i stedet for MM. For en
    # indeks som Nasdaq er noncomm_net % av OI det beste tilgjengelige
    # spec-positionsmålet.
    drivers:
      - name: positioning_mm_pct
        weight: 0.6
        params:
          metric: noncomm_net_pct
          lookback_weeks: 52
      - name: cot_z_score
        weight: 0.4
        params:
          metric: noncomm_net_pct
          lookback_weeks: 52
  macro:
    # Equity-tolkning: Nasdaq er rente-sensitiv (lange durations i tech),
    # USD-svakhet svakt bull (global liquidity), VIX lavt = risk-on bull.
    drivers:
      - name: real_yield
        weight: 0.4
        params:
          bull_when: low   # Lav real-yield = bull for vekst-aksjer
      - name: dxy_chg5d
        weight: 0.4
        params:
          bull_when: negative  # USD-svakhet = global liquidity = bull
          window: 5
      - name: vix_regime
        weight: 0.2
        params:
          invert: false  # Lav VIX = risk-on = bull (motsatt av Gold)
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params:
          window: 20
          mode: continuation
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 0.7
        params:
          period: 14
          lookback: 252
          mode: high_is_bull
      - name: event_distance
        weight: 0.3
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: indices
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: indices
          k: 5
          horizon_days: 30
          min_history_days: 365

grade_thresholds:
  A_plus:
    min_pct_of_max: 0.75
    min_families: 4
  A:
    min_pct_of_max: 0.55
    min_families: 3
  B:
    min_pct_of_max: 0.35
    min_families: 2
