# Nasdaq — financial instrument (indices)
# Sub-fase 12.5+ session 80: 8. instrument, 7. felles signal vs cot-explorer
# (cot-explorer's eneste financial signal er Nasdaq).

inherits: family_financial

instrument:
  id: Nasdaq
  asset_class: indices
  ticker: NQ
  cfd_ticker: NAS100
  yahoo_ticker: NQ=F  # E-mini Nasdaq-100 continuous
  cot_contract: "NASDAQ-100 Consolidated - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy   # Indekser har kun legacy-rapport (ingen disaggregated)
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS
    # B1 D1 (sub-fase 12.7, session 129) — credit_spread_change + nfci_change
    # + net_fed_liq_change-input. Erstatter HY/IG OAS som ga 3y-historikk.
    - AAA10Y       # Moody's AAA Corporate spread vs 10Y Treasury
    - BAA10Y       # Moody's BAA Corporate spread vs 10Y Treasury
    - NFCI         # Chicago Fed National Financial Conditions Index
    - WALCL        # Fed Total Assets (NetFedLiq input 1)
    - RRPONTSYD    # Reverse Repo outstanding (NetFedLiq input 2)
    - WTREGEN      # Treasury General Account (NetFedLiq input 3)

aggregation: weighted_horizon

# Vekter speiler Gold-mønsteret; SCALP foretrekker structure (intraday-
# nivåer), MAKRO foretrekker positioning + macro (regime). Equity-
# spesifikt: macro-vekt litt høyere enn metals fordi rente-følsomheten
# er sterkere på indekser.
horizons:
  SCALP:
    family_weights:
      trend: 1.2
      positioning: 0.5
      macro: 0.8
      structure: 1.3
      risk: 0.8
      analog: 0.3
    max_score: 4.9
    # Session 101: asymmetrisk floor. Backtest (session 99): Nasdaq
    # BUY-hit-rate 59.7% vs SELL 11.5% (90d) — sterkeste BUY-bias av
    # alle whitelist-instrumenter. Strenger SELL-floor enn SP500.
    min_score_publish: {buy: 1.3, sell: 2.2}
  SWING:
    family_weights:
      trend: 1.0
      positioning: 1.0
      macro: 1.0
      structure: 1.0
      risk: 1.0
      analog: 0.8
    max_score: 5.8
    min_score_publish: {buy: 2.0, sell: 3.4}
  MAKRO:
    family_weights:
      trend: 0.8
      positioning: 1.2
      macro: 1.4
      structure: 0.5
      risk: 0.8
      analog: 1.2
    max_score: 5.9
    min_score_publish: {buy: 3.0, sell: 4.7}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # D1 A4+C1 (session 128): TFF (Lev Funds + Asset Mgr) erstatter
    # legacy noncomm_net_pct. Indekser har TFF-rapport via
    # 'NASDAQ-100 Consolidated' (samme cot_contract). cot_z_score
    # beholdt på legacy noncomm som cross-validering.
    # D2 A12 (session 131): aaii_extreme@0.25 lagt til som mean-
    # reversion-input (kontra-indikator). Andre vekter justert per
    # § 19.5 Del C+ målmiks: 0.30 / 0.15 / 0.30 / 0.25.
    drivers:
      - name: positioning_lev_funds_pct
        weight: 0.30
        params: {metric: lev_funds_net_pct, lookback_weeks: 52}
      - name: positioning_asset_mgr_pct
        weight: 0.15
        params: {metric: asset_mgr_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.30
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
      - name: aaii_extreme
        weight: 0.25
        params: {metric: bullish_pct, lookback_weeks: 52}
        horizons:
          - SWING
  macro:
    # Equity-tolkning: Nasdaq er rente-sensitiv (lange durations i tech),
    # USD-svakhet svakt bull (global liquidity), VIX lavt = risk-on bull.
    # B1 D1 (sub-fase 12.7, session 129): net_fed_liq_change@0.25 +
    # nfci_change@0.20 lagt til. NetFedLiq fanger likviditets-impulser
    # (særlig viktig for tech-tunge Nasdaq); NFCI fanger overordnet
    # finansielle conditions. Sum = 1.00.
    drivers:
      - name: real_yield
        weight: 0.25
        params:
          bull_when: low
      - name: dxy_chg5d
        weight: 0.20
        params:
          bull_when: negative
          window: 5
      - name: vix_regime
        weight: 0.10
        params:
          invert: false
      - name: net_fed_liq_change
        weight: 0.25
        params: {bull_when: high}  # Liquidity-vekst = bull risk-on
      - name: nfci_change
        weight: 0.20
        params: {bull_when: low}   # Lav NFCI = løsere conditions = bull
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params:
          window: 20
          mode: continuation
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    # Sub-fase 12.6 (session 138): DROP vix_term_ratio (median |IC|=0.029 +
    # median monotonisitet=0.00 — eneste driver som feiler begge strict
    # PLAN § 12.6-tersklene). 0.20-vekten redistribuert proporsjonalt
    # til vol_regime + credit_spread_change. event_distance uendret pr.
    # Strategi 3.
    drivers:
      - name: vol_regime
        weight: 0.59
        params:
          period: 14
          lookback: 252
          mode: high_is_bull
      - name: event_distance
        weight: 0.15
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
      - name: credit_spread_change
        weight: 0.26
        params: {bull_when: low}
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: indices
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: indices
          k: 5
          horizon_days: 30
          min_history_days: 365

grade_thresholds:
  A_plus:
    min_pct_of_max: 0.75
    min_families: 4
  A:
    min_pct_of_max: 0.55
    min_families: 3
  B:
    min_pct_of_max: 0.35
    min_families: 2
