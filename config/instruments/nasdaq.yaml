# Nasdaq — financial instrument (indices)
# Sub-fase 12.5+ session 80: 8. instrument, 7. felles signal vs cot-explorer
# (cot-explorer's eneste financial signal er Nasdaq).

inherits: family_financial

instrument:
  id: Nasdaq
  asset_class: indices
  ticker: NQ
  cfd_ticker: NAS100
  yahoo_ticker: NQ=F  # E-mini Nasdaq-100 continuous
  cot_contract: "NASDAQ-100 Consolidated - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy   # Indekser har kun legacy-rapport (ingen disaggregated)
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS
    # B1 D1 (sub-fase 12.7, session 129) — credit_spread_change + nfci_change
    # + net_fed_liq_change-input. Erstatter HY/IG OAS som ga 3y-historikk.
    - AAA10Y       # Moody's AAA Corporate spread vs 10Y Treasury
    - BAA10Y       # Moody's BAA Corporate spread vs 10Y Treasury
    - NFCI         # Chicago Fed National Financial Conditions Index
    - WALCL        # Fed Total Assets (NetFedLiq input 1)
    - RRPONTSYD    # Reverse Repo outstanding (NetFedLiq input 2)
    - WTREGEN      # Treasury General Account (NetFedLiq input 3)

aggregation: weighted_horizon

# Vekter speiler Gold-mønsteret; SCALP foretrekker structure (intraday-
# nivåer), MAKRO foretrekker positioning + macro (regime). Equity-
# spesifikt: macro-vekt litt høyere enn metals fordi rente-følsomheten
# er sterkere på indekser.
# Sub-fase 12.10 follow-up Spor B (session 138): event-familie lagt til
# for *_surprise-drivere (NFP/CPI/GDP/PCE). Vekt 0.3 SCALP/SWING, 0.5
# MAKRO. max_score bumpet tilsvarende.
horizons:
  SCALP:
    family_weights:
      trend: 1.2
      positioning: 0.5
      macro: 0.8
      structure: 1.3
      risk: 0.8
      analog: 0.3
      event: 0.3
    max_score: 5.2
    # Session 101: asymmetrisk floor. Backtest (session 99): Nasdaq
    # BUY-hit-rate 59.7% vs SELL 11.5% (90d) — sterkeste BUY-bias av
    # alle whitelist-instrumenter. Strenger SELL-floor enn SP500.
    min_score_publish: {buy: 1.3, sell: 2.2}
  SWING:
    family_weights:
      trend: 1.0
      positioning: 1.0
      macro: 1.0
      structure: 1.0
      risk: 1.0
      analog: 0.8
      event: 0.3
    max_score: 6.1
    min_score_publish: {buy: 2.0, sell: 3.4}
  MAKRO:
    family_weights:
      trend: 0.8
      positioning: 1.2
      macro: 1.4
      structure: 0.5
      risk: 0.8
      analog: 1.2
      event: 0.5
    max_score: 6.4
    min_score_publish: {buy: 3.0, sell: 4.7}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # D1 A4+C1 (session 128): TFF (Lev Funds + Asset Mgr) erstatter
    # legacy noncomm_net_pct. Indekser har TFF-rapport via
    # 'NASDAQ-100 Consolidated' (samme cot_contract). cot_z_score
    # beholdt på legacy noncomm som cross-validering.
    # D2 A12 (session 131): aaii_extreme@0.25 lagt til som mean-
    # reversion-input (kontra-indikator). Andre vekter justert per
    # § 19.5 Del C+ målmiks: 0.30 / 0.15 / 0.30 / 0.25.
    drivers:
      - name: positioning_lev_funds_pct
        weight: 0.30
        params: {metric: lev_funds_net_pct, lookback_weeks: 52}
      - name: positioning_asset_mgr_pct
        weight: 0.15
        params: {metric: asset_mgr_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.30
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
      - name: aaii_extreme
        weight: 0.25
        params: {metric: bullish_pct, lookback_weeks: 52}
        horizons:
          - SWING
  macro:
    # Equity-tolkning: Nasdaq er rente-sensitiv (lange durations i tech),
    # USD-svakhet svakt bull (global liquidity), VIX lavt = risk-on bull.
    # B1 D1 (sub-fase 12.7, session 129): net_fed_liq_change@0.25 +
    # nfci_change@0.20 lagt til. NetFedLiq fanger likviditets-impulser
    # (særlig viktig for tech-tunge Nasdaq); NFCI fanger overordnet
    # finansielle conditions. Sum = 1.00.
    drivers:
      # Sub-fase 12.10 follow-up A5 (session 142): m2_yoy + t10y3m lagt til
      # (bunke3 #11/#7). real_yield 0.25→0.20, dxy 0.20→0.15 for sum=1.00.
      # Sub-fase 12.10 follow-up A8 (session 142): initial_claims_z +
      # industrial_production_yoy lagt til (bunke3 #9/#10). real_yield 0.20→
      # 0.15, net_fed_liq 0.25→0.20 for sum=1.00.
      - name: real_yield
        weight: 0.05
        params:
          bull_when: low
      - name: dxy_chg5d
        weight: 0.10
        params:
          bull_when: negative
          window: 5
      - name: vix_regime
        weight: 0.10
        params:
          invert: false
      - name: net_fed_liq_change
        weight: 0.20
        params: {bull_when: high}
        horizons:
          - MAKRO
      # Sub-fase 12.10 follow-up A10 (session 142): nfci_change → anfci_z
      # (§ 22.2 #11). Samme weight + bull_when.
      - name: anfci_z
        weight: 0.20
        params: {bull_when: low}
        horizons:
          - MAKRO
      - name: m2_yoy
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
      - name: t10y3m
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
      - name: initial_claims_z
        weight: 0.05
        params: {bull_when: low}
        horizons:
          - MAKRO
      - name: industrial_production_yoy
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
      - name: umich_sentiment_z
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
      # Sub-fase 12.10 follow-up A10 (session 142): cfnai_3mma + jolts_openings_yoy.
      # real_yield 0.10→0.05, dxy 0.15→0.10 for sum=1.00.
      # Sub-fase 12.10 follow-up Spor F1 (2026-05-02): cfnai_3mma byttet ut
      # med ism_pmi_level (Bunke3 DEFERRED-driver re-åpnet). ISM Manufacturing
      # PMI er den primære markedet-fulgte diffusion-indeks; tighter step-
      # mapping rundt 50-linjen. Vekt 0.05 bevart, sum=1.00.
      - name: ism_pmi_level
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
      - name: jolts_openings_yoy
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params:
          window: 20
          mode: continuation
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    # Sub-fase 12.10 follow-up A1 (session 140): cboe_skew_z + vix9d_vix_ratio
    # lagt til (bunke4 + bunke3 fra 12.10). Tech-tunge Nasdaq er ekstra
    # følsom for tail-risk-priced (SKEW); VIX9D/VIX-ratio fanger short-term
    # fear-spikes som typisk mean-reverter på 5-10d. vol_regime trimmet
    # 0.59→0.39 for å holde familie-sum=1.00.
    # Sub-fase 12.10 follow-up A2 (session 141): vvix_z@0.05 lagt til
    # (bunke4 #15). VVIX (vol-of-vol) gir Nasdaq en third risk-input som
    # er sterkt korrelert med tech-sektor-rebalansering. vol_regime
    # 0.39→0.34 for sum=1.00.
    # Sub-fase 12.10 follow-up A7 (session 142): hy_oas_change@0.05.
    # Tech-tunge Nasdaq er HY-credit-følsom (lav-margin tech-låntakere
    # først rammet ved spread-utvidelse). credit_spread_change 0.26→0.21.
    drivers:
      - name: vol_regime
        weight: 0.29
        params:
          period: 14
          lookback: 252
          mode: high_is_bull
      - name: event_distance
        weight: 0.15
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
      - name: credit_spread_change
        weight: 0.21
        params: {bull_when: low}
        horizons:
          - MAKRO
      - name: cboe_skew_z
        weight: 0.10
        params: {bull_when: low, lookback_days: 252}
      - name: vix9d_vix_ratio
        weight: 0.10
        params: {bull_when: low}
        horizons:
          - SCALP
          - SWING
      - name: vvix_z
        weight: 0.05
        params: {bull_when: low, lookback_days: 252}
      - name: hy_oas_change
        weight: 0.05
        params: {bull_when: low}
        horizons:
          - MAKRO
      # Sub-fase 12.10 follow-up A9 (session 142): move_index_z@0.05
      # (bunke4 #15) — bond-vol cross-check. vol_regime 0.34→0.29.
      - name: move_index_z
        weight: 0.05
        params: {bull_when: low, lookback_days: 252}
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: indices
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: indices
          k: 5
          horizon_days: 30
          min_history_days: 365

        horizons:
          - MAKRO
          - SWING
  # Sub-fase 12.10 follow-up Spor B (session 138): event-familie. NFP/GDP
  # positive surprise = bull stocks; CPI/PCE positive surprise = bear
  # (Fed hawkish). Polarity directional.
  event:
    polarity: directional
    drivers:
      - name: nfp_surprise
        weight: 0.25
        params: {bull_when: high}
      - name: cpi_surprise
        weight: 0.25
        params: {bull_when: low}
      - name: gdp_surprise
        weight: 0.25
        params: {bull_when: high}
      - name: pce_surprise
        weight: 0.25
        params: {bull_when: low}
grade_thresholds:
  A_plus:
    min_pct_of_max: 0.75
    min_families: 4
  A:
    min_pct_of_max: 0.55
    min_families: 3
  B:
    min_pct_of_max: 0.35
    min_families: 2
