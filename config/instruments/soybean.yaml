# Soybean — agri instrument (grains)
# Sub-fase 12.5 Block C session 75. US-cornbelt-overlapp med Corn,
# men egen pod-set-periode juli-aug.

inherits: family_agri

instrument:
  id: Soybean
  asset_class: grains
  ticker: ZS
  round_number_step: 50   # psykologiske runde tall (setup-generator)
  cfd_ticker: Soybean
  yahoo_ticker: ZS=F
  cot_contract: "SOYBEANS - CHICAGO BOARD OF TRADE"
  cot_report: disaggregated
  weather_region: us_cornbelt
  weather_lat: 40.75
  weather_lon: -96.75

aggregation: additive_sum
max_score: 16
min_score_publish: 6

families:
  outlook:
    weight: 5
    drivers:
      - name: seasonal_stage
        weight: 1.0
        params:
          # US Soybean: planting May-Jun, pod-set Jul-Aug (yield-
          # determinerende), maturity Sep, harvest Oct.
          # Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec
          monthly_scores: [0.3, 0.3, 0.4, 0.5, 0.7, 0.9, 1.0, 1.0, 0.8, 0.5, 0.4, 0.3]
        horizons:
          - MAKRO
  yield:
    # Session 98: utvidet med crop_progress_stage (NASS GOOD/EXCELLENT).
    # Vekter: weather 25% + crop_progress 25% (samme yield-domene splittet)
    # + wasde 50% (autoritativ S2U). US er ~30% av global soybean-produksjon.
    # Sub-fase 12.10 follow-up Spor D (session 137): nass_yield_soy_yoy
    # @0.20 lagt til. NASS årlig yield-survey (final + monthly forecasts).
    # Trim: weather 0.25→0.20, crop_progress 0.25→0.20, wasde 0.50→0.40
    # for sum=1.00.
    # Sub-fase 12.11: drought_monitor flyttet hit fra `weather`-familien.
    # Vekter re-balansert: weather 0.15 + crop_progress 0.15 + wasde 0.30
    # + nass_yield 0.15 + drought_monitor 0.25 = 1.00.
    weight: 3
    drivers:
      - name: weather_stress
        weight: 0.15
        params:
          lookback_months: 1
        horizons: &id001
          - MAKRO
          - SWING
      - name: crop_progress_stage
        weight: 0.15
        params:
          metric: GOOD_EXCELLENT
          mode: low_is_bull
        horizons:
          - MAKRO
          - SWING
      - name: wasde_s2u_change
        weight: 0.30
        params:
          region: US
        horizons:
          - MAKRO
          - SWING
      - name: nass_yield_soy_yoy
        weight: 0.15
        params:
          bull_when: low
        horizons:
          - MAKRO
          - SWING
      - name: drought_monitor
        weight: 0.25
        params:
          aoi: us
          metric: d2_pct
          bull_when: high
        horizons:
          - MAKRO
          - SWING
  positioning:
    # Sub-fase 12.11: erstatter ren-dobbel-talt weather-familie med
    # COT-positioning-signal. 3 ortogonale metrics — se cocoa.yaml.
    weight: 2
    drivers:
      - name: positioning_mm_pct
        weight: 0.40
        params: {}
        horizons:
          - MAKRO
          - SWING
      - name: cot_oi_change
        weight: 0.35
        params:
          contract: "SOYBEANS - CHICAGO BOARD OF TRADE"
          report: disaggregated
        horizons:
          - MAKRO
          - SWING
      - name: cot_swap_dealer_skew
        weight: 0.25
        params:
          contract: "SOYBEANS - CHICAGO BOARD OF TRADE"
          report: disaggregated
        horizons:
          - MAKRO
          - SWING
  enso:
    weight: 2
    drivers:
      - name: noaa_oni_index
        weight: 1.0
        params: {}
        horizons:
          - MAKRO
  conab:
    # Sub-fase 12.5+ session 111: Brasil er ~40% av global soybean-
    # produksjon — DOMINANT. Conab er PRIMÆR data-kilde for soybean
    # (overstyrer family_agri-default-placeholder). conab_yoy som
    # eneste driver.
    weight: 2
    drivers:
      - name: conab_yoy
        weight: 1.0
        params:
          commodity: soja
        horizons:
          - MAKRO
  cross:
    # Sub-fase 12.5+ session 113: bdi_chg30d → shipping_pressure med
    # eksplisitt index=BDI (Baltic-suite-rebrand).
    # Sub-fase 12.7 D2 session 133 (A3): fas_exports lagt til @ 0.20.
    # Soybean er US' nest-største ag-eksport (etter Corn) — FAS ESR
    # demand-signal er primær cross-input. dxy 0.70 → 0.55, shipping
    # 0.20 → 0.15. Sum=1.00 per § 19.5 Del C+ måltilstand.
    # Sub-fase 12.10 follow-up Spor D (session 137): nass_grain_stocks_
    # quarterly@0.10 lagt til. dxy 0.55→0.45 for sum=1.00.
    weight: 2
    drivers:
      - name: dxy_chg5d
        weight: 0.45
        params:
          bull_when: negative
          window: 5
      - name: shipping_pressure
        weight: 0.15
        params:
          index: BDI
          window_days: 30
          bull_when: negative
      - name: event_distance
        weight: 0.1
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SWING
      - name: fas_exports
        weight: 0.2
        params:
          bull_when: high
        horizons:
          - MAKRO
          - SWING
      - name: nass_grain_stocks_quarterly
        weight: 0.1
        params:
          commodity: SOYBEANS
          category: TOTAL
          bull_when: low
        horizons:
          - MAKRO
          - SWING
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    weight: 2
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          outcome_threshold_pct: 3.0
          min_history_days: 365
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params:
          asset_class: grains
          k: 5
          horizon_days: 30
          min_history_days: 365

        horizons:
          - MAKRO
          - SWING
grade_thresholds:
  A_plus: {min_score: 11, min_families_active: 4}
  A: {min_score: 8, min_families_active: 3}
  B: {min_score: 6, min_families_active: 2}
