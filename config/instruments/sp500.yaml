# S&P 500 — financial instrument (indices)
# Sub-fase 12.5+ session 81: 10. instrument. Bredere equity-coverage
# (Nasdaq er tech-tung; SP500 er bredere markedsbarometer).

inherits: family_financial

instrument:
  id: SP500
  asset_class: indices
  ticker: ES
  cfd_ticker: SPX500
  yahoo_ticker: ES=F
  cot_contract: "E-MINI S&P 500 - CHICAGO MERCANTILE EXCHANGE"
  cot_report: legacy
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS
    # B1 D1 (sub-fase 12.7, session 129) — credit_spread_change + nfci_change
    # + net_fed_liq_change-input. Erstatter HY/IG OAS som ga 3y-historikk.
    - AAA10Y       # Moody's AAA Corporate spread vs 10Y Treasury
    - BAA10Y       # Moody's BAA Corporate spread vs 10Y Treasury
    - NFCI         # Chicago Fed National Financial Conditions Index
    - WALCL        # Fed Total Assets (NetFedLiq input 1)
    - RRPONTSYD    # Reverse Repo outstanding (NetFedLiq input 2)
    - WTREGEN      # Treasury General Account (NetFedLiq input 3)

aggregation: weighted_horizon

horizons:
  # Session 101: asymmetrisk publish-floor. Backtest (session 99) viser
  # SP500 BUY-hit-rate 50.5% vs SELL 11.0% (90d) — equity-premium-bias.
  # BUY-floor lavere (lett å oppnå); SELL-floor høyere (krever sterkt
  # signal for å publishere mot trenden).
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 0.8, structure: 1.3, risk: 0.8, analog: 0.3}
    max_score: 4.9
    min_score_publish: {buy: 1.3, sell: 2.0}
  SWING:
    family_weights: {trend: 1.0, positioning: 1.0, macro: 1.0, structure: 1.0, risk: 1.0, analog: 0.8}
    max_score: 5.8
    min_score_publish: {buy: 2.0, sell: 3.2}
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.2, macro: 1.4, structure: 0.5, risk: 0.8, analog: 1.2}
    max_score: 5.9
    min_score_publish: {buy: 3.0, sell: 4.5}

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # D1 A4+C1 (session 128): TFF (Lev Funds + Asset Mgr) erstatter
    # legacy noncomm_net_pct. cot_z_score beholdt som cross-validering.
    drivers:
      # D2 A12 (session 131): aaii_extreme@0.25 lagt til som mean-
      # reversion-input. Andre vekter justert per § 19.5 Del C+
      # målmiks: 0.30 / 0.15 / 0.30 / 0.25.
      - name: positioning_lev_funds_pct
        weight: 0.30
        params: {metric: lev_funds_net_pct, lookback_weeks: 52}
      - name: positioning_asset_mgr_pct
        weight: 0.15
        params: {metric: asset_mgr_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.30
        params: {metric: noncomm_net_pct, lookback_weeks: 52}
      - name: aaii_extreme
        weight: 0.25
        params: {metric: bullish_pct, lookback_weeks: 52}
        horizons:
          - SWING
  macro:
    # Equity-tolkning identisk Nasdaq men med fokus på rente-følsomhet
    # (SP500 er bredere, mindre tech-tung).
    # B1 D1 (sub-fase 12.7, session 129): net_fed_liq_change@0.25 +
    # nfci_change@0.20 lagt til. Sum = 1.00.
    # Sub-fase 12.10 follow-up A5 (session 142): m2_yoy + t10y3m lagt til
    # (bunke3 #11/#7) — M2 YoY veksttak (likviditet) + 10Y-3M spread
    # (recession-leader). real_yield 0.20→0.15, dxy 0.20→0.15 for sum=1.00.
    # Sub-fase 12.10 follow-up A8 (session 142): initial_claims_z +
    # industrial_production_yoy lagt til (bunke3 #9/#10) — labor-styrke +
    # growth-tempo. vix 0.15→0.10, net_fed_liq 0.25→0.20 for sum=1.00.
    drivers:
      - name: real_yield
        weight: 0.15
        params: {bull_when: low}
      - name: dxy_chg5d
        weight: 0.15
        params: {bull_when: negative, window: 5}
      - name: vix_regime
        weight: 0.10
        params: {invert: false}
      - name: net_fed_liq_change
        weight: 0.20
        params: {bull_when: high}
        horizons:
          - MAKRO
      - name: nfci_change
        weight: 0.20
        params: {bull_when: low}
        horizons:
          - MAKRO
      - name: m2_yoy
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
      - name: t10y3m
        weight: 0.05
        params: {bull_when: high}  # steep curve = expansion = bull equity
        horizons:
          - MAKRO
      - name: initial_claims_z
        weight: 0.05
        params: {bull_when: low}  # lave claims = sterk arbeidsmarked = bull
        horizons:
          - MAKRO
      - name: industrial_production_yoy
        weight: 0.05
        params: {bull_when: high}
        horizons:
          - MAKRO
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    # Sub-fase 12.10 follow-up A1 (session 140): cboe_skew_z + vix9d_vix_ratio
    # lagt til (bunke4 + bunke3 fra 12.10). Skew = options-tail-priced
    # bekymring (alle horisonter); VIX9D/VIX = front-end vol-curve mean-
    # revert (SCALP/SWING). vol_regime trimmet 0.59→0.39 for å holde
    # familie-sum=1.00.
    # Sub-fase 12.10 follow-up A2 (session 141): vvix_z@0.05 lagt til
    # (bunke4 #15) — VIX of VIX z-score. Lav VVIX = vol-vol-stabilitet =
    # risk-on. Komplementerer cboe_skew_z (hale-priced) med actual vol-
    # variansjon. vol_regime 0.39→0.34 for sum=1.00.
    # Sub-fase 12.10 follow-up A7 (session 142): hy_oas_change@0.05 lagt
    # til (bunke3 #8) — direkte ICE BofA US High Yield OAS WoW-pt-endring.
    # Komplementerer credit_spread_change (Moody's AAA/BAA — IG-credit)
    # med direkte HY-credit-stress-input. credit_spread_change 0.26→0.21
    # for sum=1.00.
    drivers:
      - name: vol_regime
        weight: 0.34
        params: {period: 14, lookback: 252, mode: high_is_bull}
      - name: event_distance
        weight: 0.15
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
        horizons:
          - SCALP
          - SWING
      - name: credit_spread_change
        weight: 0.21
        params: {bull_when: low}
        horizons:
          - MAKRO
      - name: cboe_skew_z
        weight: 0.10
        params: {bull_when: low, lookback_days: 252}
      - name: vix9d_vix_ratio
        weight: 0.10
        params: {bull_when: low}
        horizons:
          - SCALP
          - SWING
      - name: vvix_z
        weight: 0.05
        params: {bull_when: low, lookback_days: 252}
      - name: hy_oas_change
        weight: 0.05
        params: {bull_when: low}  # narrowing = risk-on
        horizons:
          - MAKRO
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: indices, k: 5, horizon_days: 30, outcome_threshold_pct: 3.0, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: indices, k: 5, horizon_days: 30, min_history_days: 365}
        horizons:
          - MAKRO
          - SWING

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A: {min_pct_of_max: 0.55, min_families: 3}
  B: {min_pct_of_max: 0.35, min_families: 2}
