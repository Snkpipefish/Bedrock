# Brent Crude Oil — financial instrument (energy)
# Session 92. Whitelist-instrument "OIL BRENT". Global oil benchmark.
# Følger CrudeOil-mønster (samme energy-asset-class).

inherits: family_financial

instrument:
  id: Brent
  asset_class: energy
  ticker: XBRUSD
  cfd_ticker: "OIL BRENT"
  yahoo_ticker: BZ=F
  cot_contract: "BRENT LAST DAY - NEW YORK MERCANTILE EXCHANGE"
  cot_report: disaggregated
  fred_series_ids:
    - DGS10
    - T10YIE
    - DTWEXBGS
    - VIXCLS

aggregation: weighted_horizon

horizons:
  SCALP:
    family_weights: {trend: 1.2, positioning: 0.5, macro: 0.8, structure: 1.3, risk: 0.8, analog: 0.3}
    max_score: 4.9
    min_score_publish: 1.5
  SWING:
    family_weights: {trend: 1.0, positioning: 1.2, macro: 1.0, structure: 1.0, risk: 1.0, analog: 0.6}
    max_score: 5.8
    min_score_publish: 2.5
  MAKRO:
    family_weights: {trend: 0.8, positioning: 1.5, macro: 1.3, structure: 0.5, risk: 0.8, analog: 1.0}
    max_score: 5.9
    min_score_publish: 3.5

families:
  trend:
    drivers:
      - {name: sma200_align, weight: 0.5, params: {tf: D1}}
      - {name: momentum_z, weight: 0.5, params: {window: 20}}
  positioning:
    # Sub-fase 12.5+ session 106: Brent er ICE-listet (XBRUSD = ICE Brent
    # Last Day), så ICE-COT er primær kilde. CFTC's "Brent Last Day -
    # NYMEX" er en US-mini-kontrakt med lav likviditet — beholdes kun
    # som sekundær cross-validering via cot_z_score.
    drivers:
      - name: cot_ice_mm_pct
        weight: 0.6
        params: {contract: ice brent crude, metric: mm_net_pct, lookback_weeks: 52}
      - name: cot_z_score
        weight: 0.4
        params: {metric: mm_net_pct, lookback_weeks: 52}
  macro:
    # Sub-fase 12.5+ session 107: US crude inventories er ledende
    # fundamental også for Brent (US er største importør; EIA-rapport
    # publiseres tidlig + brukes globalt for global balance-insight).
    drivers:
      - name: real_yield
        weight: 0.15
        params: {bull_when: low}
      - name: dxy_chg5d
        weight: 0.35
        params: {bull_when: negative, window: 5}
      - name: vix_regime
        weight: 0.2
        params: {invert: true}
      - name: eia_stock_change
        weight: 0.3
        params: {series_id: WCESTUS1}  # US Crude Oil Stocks (global proxy)
  structure:
    drivers:
      - name: range_position
        weight: 1.0
        params: {window: 20, mode: continuation}
  risk:
    polarity: neutral  # ADR-006: vol_regime trend-friendly begge retninger
    drivers:
      - name: vol_regime
        weight: 0.7
        params: {period: 14, lookback: 252, mode: high_is_bull}
      - name: event_distance
        weight: 0.3
        params:
          countries: [USD]
          impact_levels: [High]
          min_hours: 4
  analog:
    polarity: neutral  # ADR-006 + session 100: direction-aware i driver, engine flipper ikke
    drivers:
      - name: analog_hit_rate
        weight: 0.5
        params: {asset_class: energy, k: 5, horizon_days: 30, outcome_threshold_pct: 5.0, min_history_days: 365}
      - name: analog_avg_return
        weight: 0.5
        params: {asset_class: energy, k: 5, horizon_days: 30, min_history_days: 365}

grade_thresholds:
  A_plus: {min_pct_of_max: 0.75, min_families: 4}
  A:      {min_pct_of_max: 0.55, min_families: 3}
  B:      {min_pct_of_max: 0.35, min_families: 2}
