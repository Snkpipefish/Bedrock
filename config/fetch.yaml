# Fetch-cadence-config per PLAN § 7.2.
#
# Fase 6 session 28: YAML-lasting + staleness-sjekker.
# Full scheduler (cron-daemon/systemd) kommer i senere session.
#
# stale_hours: hvor gammel siste observasjon kan være før fetcher må
# re-kjøres. Burde matche fetch-cadencen — f.eks. daglig fetch har
# stale_hours ≈ 24-30.
#
# on_failure:
#   log_and_skip         — logg og fortsett neste fetcher
#   retry_with_backoff   — tenacity-retry før opp-gi
#   raise                — kast exception, stopp pipeline

fetchers:
  prices:
    module: bedrock.fetch.prices
    cron: "40 * * * 1-5"       # hverdager hver time :40
    stale_hours: 30            # EOD-priser aksepterer ~1 dag forsinkelse
    on_failure: retry_with_backoff
    table: prices
    ts_column: ts

  cot_disaggregated:
    module: bedrock.fetch.cot_cftc
    cron: "0 22 * * 5"         # fredag 22:00 UTC (etter CFTC-publisering)
    stale_hours: 264           # ukentlig + 4d buffer (sub-fase 12.8 § 20.4)
    on_failure: log_and_skip
    table: cot_disaggregated
    ts_column: report_date

  cot_legacy:
    module: bedrock.fetch.cot_cftc
    cron: "0 22 * * 5"
    stale_hours: 264           # ukentlig + 4d buffer
    on_failure: log_and_skip
    table: cot_legacy
    ts_column: report_date

  # Sub-fase 12.7 D1 A4 (session 128): TFF = Traders in Financial Futures
  # (CFTC's mer detaljerte rapport for FX/indices/crypto med dealer/
  # asset_mgr/lev_funds/other-bryning). Wired som ukentlig fetcher
  # 2026-05-26 etter operatør-spørsmål om stale data. positioning_tff-
  # driver eksisterer i koden men er ikke aktivt wired i instrument-
  # config; fetcher kjører likevel for å holde data fersk.
  cot_tff:
    module: bedrock.fetch.cot_cftc
    cron: "0 22 * * 5"         # fredag 22:00 UTC (samme som legacy/disaggregated)
    stale_hours: 264           # ukentlig + 4d buffer
    on_failure: log_and_skip
    table: cot_tff
    ts_column: report_date

  fundamentals:
    module: bedrock.fetch.fred
    cron: "30 2 * * *"          # daglig 02:30 UTC
    stale_hours: 48             # FRED-data har 1-3 dagers publiserings-lag
    on_failure: retry_with_backoff
    table: fundamentals
    ts_column: date
    us_calendar: true           # FRED publiserer kun US-bank-business-days
    # Session 2026-06-12: vinduet var stale_hours×2 ≈ 4 dager — kortere enn
    # publiserings-lag for NFCI (ukentlig, ~5d lag) og IRLTLT01* (månedlig,
    # 1-3 mnd lag). Resultat: «OK → 0 rows» hver dag, NFCI ble 56 dager
    # gammel. 150 dager dekker OECD-renteserienes verste lag. Re-fetch er
    # idempotent (INSERT OR REPLACE).
    lookback_days: 150
    # Staleness måles kun på alltid-aktive daglige serier — uten filter
    # maskerte USDA PSDs fremtidsdaterte rader (2026-10-01) hele tabellen.
    series_filter: [DGS10, VIXCLS, T10YIE, AAA10Y, BAA10Y, RRPONTSYD]

  # Session 2026-06-12: makro-FRED-serier utenfor instrument-YAMLenes
  # fred_series_ids (bunke 1/3 + event_surprise-drivere). Tidligere kun
  # engangs-backfills (fred_b1.py, fred_bunke3.py) — DEX*-FX og HY-OAS var
  # 6+ uker stale mens dollar_index_breadth/hy_oas_change scoret på dem.
  # Serieliste eies av runner (_FRED_MACRO_SERIES i fetch_runner.py).
  # lookback 240d dekker GDP-kvartalslag (~4 mnd) + JOLTS (~2 mnd).
  fred_macro:
    module: bedrock.fetch.fred
    cron: "45 2 * * *"          # daglig 02:45 Oslo (etter fundamentals 02:30)
    # H.15 (DGS2/DGS3MO) og HY-OAS publiseres D+1 til D+2 på FRED —
    # observert business-alder midt på dagen er 36-66h. 96h skiller
    # ekte feil fra normalt lag (us_calendar teller kun bus-timer).
    stale_hours: 96
    on_failure: retry_with_backoff
    table: fundamentals
    ts_column: date
    us_calendar: true
    lookback_days: 240
    series_filter: [DGS2, DGS3MO, BAMLH0A0HYM2]  # kun daglige serier måles

  # Session 2026-06-12: Yahoo-vol/FX-indekser lagret som pseudo-FRED-serier
  # i fundamentals (presedens session 128/131). Tidligere kun engangs-
  # backfills (dxy_yahoo.py, vix_term.py, bunke4_data.py) — DX-Y.NYB var
  # 44 dager stale mens dxy_chg5d scoret på den i 17 instrumenter.
  # Tickerliste eies av runner (_YAHOO_MACRO_TICKERS i fetch_runner.py).
  yahoo_macro:
    module: bedrock.fetch.yahoo
    cron: "15 3 * * *"          # daglig 03:15 Oslo (etter US-close + Yahoo-lag)
    stale_hours: 48             # daglig close D+1 + helg-buffer (us_calendar)
    on_failure: log_and_skip
    table: fundamentals
    ts_column: date
    us_calendar: true
    lookback_days: 14
    series_filter: [DX-Y.NYB, VIX3M, VIX9D]  # kun daglige kjerne-serier måles

  weather:
    module: bedrock.fetch.weather
    cron: "0 3 * * *"           # daglig 03:00 UTC
    stale_hours: 30
    on_failure: retry_with_backoff
    table: weather
    ts_column: date

  # Sub-fase 12.11+ analytiker D.2: ANP Brasil etanol pumpe-pris.
  # Eksport-impact-vektet daglig snitt for Centro-Sul-states.
  # Erstatter crude-oil-proxy med direkte etanol-paritet-måling.
  # Månedlig publisering ~5. i mnd; vi henter 7. for buffer.
  anp_ethanol:
    module: bedrock.fetch.anp_ethanol
    cron: "0 5 7 * *"            # 7. i mnd 05:00 Oslo
    stale_hours: 720              # månedlig
    on_failure: log_and_skip
    table: fundamentals
    ts_column: date
    series_prefix: ANP_           # egne serier, ikke delt tabell-MAX (2026-06-12)

  # Sub-fase 12.11+ analytiker D.5: USDA FAS PSD India sugar.
  # Offisiell tidsserie (production/exports/imports/end-stocks),
  # 16+ års historikk via API. Erstatter ISMA-parsing som kjernekilde.
  # USDA reviderer årlig per WASDE-publisering — månedlig refresh
  # fanger oppdaterte tall.
  usda_psd_india_sugar:
    module: bedrock.fetch.usda_psd
    cron: "0 22 12 * *"          # 12. i mnd 22:00 Oslo (etter WASDE 11.)
    stale_hours: 720              # månedlig
    on_failure: log_and_skip
    table: fundamentals
    ts_column: date
    # PSD lagrer marketing-year-projeksjoner med fremtidsdato (f.eks.
    # 2026-10-01) — alder clampes til 0 i check_staleness. Dato-basert
    # staleness er derfor svak for denne; feilet kjøring fanges av
    # systemd OnFailure-notify i stedet.
    series_prefix: USDA_PSD_

  # Sub-fase 12.11+ session 154: UN Comtrade månedlig India sugar exports.
  # Public preview-endpoint (ingen API-key), aggregerer alle 1701-HS-koder
  # for verdens-eksport. Adresserer USDA PSD årlig-lag — fanger India
  # policy-events (eksportforbud) ~6 mnd tidligere. ~2-4 mnd lag fra UN.
  # Kjører 15. i mnd for å fange forrige måneds publisering.
  comtrade_india_sugar:
    module: bedrock.fetch.comtrade
    cron: "0 6 15 * *"           # 15. i mnd 06:00 Oslo
    # UN-publisering lagger 2-4 mnd bak periode-dato — 720h dato-basert
    # terskel ga falsk trygghet før (maskert av delt tabell-MAX) og ville
    # gitt falsk alarm nå. 3360h (~4.5 mnd) matcher reelt UN-lag.
    stale_hours: 3360
    on_failure: log_and_skip
    table: fundamentals
    ts_column: date
    series_prefix: COMTRADE_      # egne serier, ikke delt tabell-MAX (2026-06-12)

  # Sub-fase 12.11+ analytiker D.5: ISMA India sukker-produksjon.
  # API-basert fetcher (https://api.ismaindia.org/api/auth/getallresource).
  # Parser produksjons-tall fra press release-titler (X lakh tonnes).
  # Begrensning: API gir kun siste 18 mnd — driver bygger historikk
  # fremover. Kjører ukentlig (mandag) for å fange nye press releases.
  isma_india:
    module: bedrock.fetch.isma_india
    cron: "0 6 * * 1"            # mandag 06:00 Oslo
    # Indisk crushing-season er ~okt-apr; ISMA publiserer ikke produksjons-
    # tall i offseason (mai-sep). 168h-terskel ga falsk staleness halve
    # året (maskert av delt tabell-MAX frem til 2026-06-12). 4400h
    # (~6 mnd) tolererer offseason; feilet kjøring fanges av systemd
    # OnFailure-notify.
    stale_hours: 4400
    on_failure: log_and_skip
    table: fundamentals
    ts_column: date
    series_prefix: ISMA_          # egne serier, ikke delt tabell-MAX (2026-06-12)

  # Sub-fase 12.11+: månedlig weather-aggregat for regioner uten cot-
  # explorer pre-aggregert JSON (foreløpig brazil_centro_sul for sukker).
  # Open-Meteo Archive trekker hele historisk vindu — idempotent
  # INSERT OR REPLACE per (region, month). Kjører 2. i mnd 04:00 Oslo
  # (etter at Open-Meteo har full forrige måned tilgjengelig).
  weather_monthly:
    module: bedrock.fetch.weather_monthly
    cron: "0 4 2 * *"           # 2. i mnd 04:00 Oslo
    # Måneds-label (YYYY-MM → 1. i mnd) eldes 31-62 dager i normal drift
    # før neste kjøring 2. i påfølgende måned — 720h ga «aging»/STALE
    # som permanent normaltilstand. 1500h (~62.5d) er første terskel som
    # aldri falsk-flagger i normal syklus (2026-06-12).
    stale_hours: 1500
    on_failure: retry_with_backoff
    table: weather_monthly
    ts_column: month

  # Sub-fase 12.10 follow-up post-Spor-F (2026-05-02): agsi + alsi
  # registrert som daglige runners. NaturalGas macro har 5 AGSI-drivere
  # + 2 ALSI-drivere wired (~30 % av familievekten). Tidligere kun
  # manuell backfill — risiko for stale signal uten advarsel. GIE
  # publiserer D+1 (typisk ~05:00 UTC); vi kjører 06:00 Oslo (04:00 UTC)
  # med stale_hours=30 (1d buffer for D+1 + helg-effekter).
  agsi:
    module: bedrock.fetch.agsi
    cron: "0 6 * * *"           # daglig 06:00 Oslo
    # ADR-015: D+1 + observert 1-2 dagers publiserings-lag. 60h lå midt
    # i normal-intervallet (48-72h) og ga kronisk falsk STALE/aging —
    # 84h (3.5d) flagger kun reelt avvik (2026-06-12).
    stale_hours: 84
    on_failure: log_and_skip
    table: agsi_storage
    ts_column: gas_day_start

  alsi:
    module: bedrock.fetch.alsi
    cron: "5 6 * * *"           # daglig 06:05 Oslo (5 min etter agsi)
    stale_hours: 84             # samme begrunnelse som agsi (ADR-015 + 2026-06-12)
    on_failure: log_and_skip
    table: alsi_storage
    ts_column: gas_day_start

  enso:
    module: bedrock.fetch.enso
    cron: "0 6 12 * *"          # 12. i måneden 06:00 UTC (etter NOAAs ~10.-publisering)
    # ONI er 3-mnd løpende snitt datert center-måned (MAM → 04-01) og
    # publiseres ~10. i måneden etter sesong-slutt — dato-basert alder er
    # dermed 40-75 dager i normal drift. 1900h (~79d) skiller ekte feil
    # fra publiserings-lag uten falske alarmer.
    stale_hours: 1900
    on_failure: log_and_skip
    table: fundamentals          # ADR-005: lagres som series_id="NOAA_ONI"
    ts_column: date
    series_filter: [NOAA_ONI]   # egne serier, ikke delt tabell-MAX (2026-06-12)

  # MERK: systemd OnCalendar tolkes i lokal TZ (Oslo: CEST/CET), ikke UTC.
  # Tidene under er valgt så de lander ETTER kildens publisering Oslo-tid.
  wasde:
    module: bedrock.fetch.wasde
    cron: "0 19 13 * *"         # 13. i mnd 19:00 Oslo (etter USDA noon ET = 18:00 Oslo)
    stale_hours: 840            # månedlig — buffer 35 dager
    on_failure: log_and_skip
    table: wasde
    ts_column: report_date
    us_calendar: true           # USDA publiserer på US-bus-days; juli-rapport landes f.eks. 11. juli (etter 4. juli holiday)

  crop_progress:
    module: bedrock.fetch.nass
    cron: "0 23 * 4-11 1"       # Mon 23:00 Oslo, kun apr-nov (NASS rel. 16 ET = 22 Oslo)
    stale_hours: 200            # ukentlig under sesong; off-season vil naturlig vise stale
    on_failure: log_and_skip
    table: crop_progress
    ts_column: week_ending
    us_calendar: true           # NASS US-publisering — Memorial Day forskyver mandags-rapport

  # Sub-fase 12.5+ session 113: bdi-runner rebrandet til shipping
  # (full Baltic-suite BDI+BCI+BPI+BSI, long-format `shipping_indices`).
  # BDI auto-hentes fra Yahoo BDRY ETF; BCI/BPI/BSI fra manuell CSV
  # (`data/manual/shipping_indices.csv`) per ADR-007 § 4.
  shipping:
    module: bedrock.fetch.shipping
    cron: "30 23 * * 1-5"       # Mon-Fri 23:30 Oslo (etter US close 22 Oslo + Yahoo-lag)
    stale_hours: 48             # Yahoo D+1 + helg-buffer Mon morning (ADR-015)
    on_failure: retry_with_backoff
    table: shipping_indices
    ts_column: date
    us_calendar: true           # BDRY ETF tradres på NYSE Arca — stengt på US-holidays

  # Sub-fase 12.5+ session 105 (ADR-007/008): Forex Factory økonomisk
  # kalender. JSON-en endrer seg når nye events legges til eller når
  # forecast/previous fylles inn 1-2 timer før release. Daglig 2× er
  # mer enn nok for event_distance-driveren (timing-krav 4-24t).
  calendar_ff:
    module: bedrock.fetch.calendar_ff
    cron: "15 6,18 * * *"        # 06:15 + 18:15 Oslo (morgen EU + ettermiddag US)
    stale_hours: 14              # 14h slack — første timer-fire kveld OK selv etter 06:15-fetch
    on_failure: log_and_skip
    table: econ_events
    ts_column: fetched_at

  # Sub-fase 12.5+ session 106 (ADR-007/008): ICE Futures Europe COT.
  # ICE publiserer fredag 18:30 London = 19:30 Oslo for tirsdag-snapshot.
  # Vi fyrer 22:30 Oslo med buffer for opplastingstid. Runneren har
  # smart-skip: hvis DB allerede har siste tirsdag-rad, hopper den
  # over HTTP-kallet (gratis-API-etiquette).
  cot_ice:
    module: bedrock.fetch.cot_ice
    cron: "30 22 * * 5"          # Fre 22:30 Oslo (etter ICE 19:30 + buffer)
    stale_hours: 264             # ukentlig + 4d buffer (sub-fase 12.8 § 20.4)
    on_failure: log_and_skip
    table: cot_ice
    ts_column: report_date

  # Sub-fase 12.5+ session 107 (ADR-007/008): EIA weekly inventories
  # (petroleum + natural gas storage). Petroleum publiseres ons 10:30 ET
  # = 16:30 Oslo; NatGas storage tor 10:30 ET = 16:30 Oslo. Smart-skip
  # i runneren hopper HTTP-kall hvis DB allerede har siste onsdag.
  # 2026-05-07: cron utvidet fra "* * 3" til "* * 3,4" (ons+tor 17:30).
  # Forrige config hentet petroleum onsdag, men NatGas (publisert tor) ble
  # liggende én uke bak. Torsdag-fyringen koster ingenting når petroleum
  # er ferskt (smart-skip), men fanger NatGas + gir publiserings-resilience
  # når petroleum-API har cache-delay forbi 17:30 Oslo onsdag.
  eia_inventories:
    module: bedrock.fetch.eia_inventories
    cron: "30 17 * * 3,4"        # Ons+Tor 17:30 Oslo (etter EIA 16:30 + buffer)
    stale_hours: 264             # ukentlig + 4d buffer (sub-fase 12.8 § 20.4)
    on_failure: log_and_skip
    table: eia_inventory
    ts_column: date
    us_calendar: true            # EIA publiserer på US-bus-days; Independence Day forskyver release

  # Sub-fase 12.5+ session 108 (ADR-007/008): COMEX warehouse-inventories
  # for gull/sølv/kobber via metalcharts.org's JSON-API. Daglig publisering
  # T-1; smart-skip i runneren hopper HTTP hvis DB allerede har siste
  # børsdag.
  comex:
    module: bedrock.fetch.comex
    cron: "0 22 * * 1-5"         # Mon-Fri 22:00 Oslo (etter COMEX-close + buffer)
    stale_hours: 60              # CME position-data publisert next-day + helg-buffer Mon morning (ADR-015)
    on_failure: log_and_skip
    table: comex_inventory
    ts_column: date
    us_calendar: true            # COMEX/CME stengt på US-bank-holidays

  # Sub-fase 12.5+ session 109 (ADR-007/008): USGS seismic events M≥4.5
  # i mining-regioner. Daglig refresh; USGS oppdaterer feeden hvert
  # minutt men refresh-cost er trivialt.
  seismic:
    module: bedrock.fetch.seismic
    cron: "0 4 * * *"            # Daglig 04:00 Oslo
    stale_hours: 30
    on_failure: log_and_skip
    table: seismic_events
    ts_column: event_ts

  # Sub-fase 12.5+ session 110 (ADR-007/008): Euronext MiFID II COT
  # for Milling Wheat (EBM) + Corn (EMA) + Canola (ECO). Publiseres
  # ons ettermiddag for forrige fredag-snapshot.
  cot_euronext:
    module: bedrock.fetch.cot_euronext
    cron: "0 18 * * 3"           # Ons 18:00 Oslo (etter publisering)
    stale_hours: 264             # ukentlig + 4d buffer (sub-fase 12.8 § 20.4)
    on_failure: log_and_skip
    table: cot_euronext
    ts_column: report_date

  # Sub-fase 12.5+ session 111 (ADR-007/008): Conab Brazil monthly crop
  # estimates (Soja/Milho/Trigo/Algodão + Café). PDF via poppler-utils
  # primær + pypdf fallback per ADR-007 § 6. Conab publiserer rundt
  # 12.-15. hver måned.
  conab:
    module: bedrock.fetch.conab
    cron: "0 20 15 * *"          # 15. i mnd 20:00 Oslo (etter Conab)
    stale_hours: 720             # månedlig (30d)
    on_failure: log_and_skip
    table: conab_estimates
    ts_column: report_date

  # Sub-fase 12.5+ session 112 (ADR-007/008): UNICA Brazil sugar/ethanol
  # halvmånedlige rapporter (Centro-Sul). PDF via poppler-utils + pypdf-
  # fallback. UNICA publiserer ~1. + ~16. hver måned.
  unica:
    module: bedrock.fetch.unica
    cron: "0 21 1,16 * *"        # 1. + 16. i mnd 21:00 Oslo
    stale_hours: 360             # halvmånedlig (~15d)
    on_failure: log_and_skip
    table: unica_reports
    ts_column: report_date

  # Sub-fase 12.5+ session 114 (ADR-007/008): Google News RSS per
  # bedrock-kategori (gold/silver/copper/oil/gas/grains/softs/
  # geopolitics/agri_weather). UI-only foreløpig; scoring-driver
  # vurderes etter ≥1 mnds empirisk data. 2× daglig matcher
  # calendar_ff-mønsteret (morgen EU + ettermiddag US).
  news_intel:
    module: bedrock.fetch.news_intel
    cron: "30 6,18 * * *"        # 06:30 + 18:30 Oslo
    stale_hours: 14              # 14h slack — første timer-fire kveld OK
    on_failure: log_and_skip
    table: news_intel
    ts_column: fetched_at

  # Sub-fase 12.5+ session 115 (ADR-007/008): Crypto sentiment
  # (alternative.me Fear & Greed Index + CoinGecko global market).
  # UI-only; scoring-driver vurderes etter ≥1 mnds data.
  crypto_sentiment:
    module: bedrock.fetch.crypto_sentiment
    cron: "0 7 * * *"            # Daglig 07:00 Oslo (etter F&G-publisering UTC midnight)
    stale_hours: 30              # daglig
    on_failure: log_and_skip
    table: crypto_sentiment
    ts_column: date
