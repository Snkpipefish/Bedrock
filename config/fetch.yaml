# Fetch-cadence-config per PLAN § 7.2.
#
# Fase 6 session 28: YAML-lasting + staleness-sjekker.
# Full scheduler (cron-daemon/systemd) kommer i senere session.
#
# stale_hours: hvor gammel siste observasjon kan være før fetcher må
# re-kjøres. Burde matche fetch-cadencen — f.eks. daglig fetch har
# stale_hours ≈ 24-30.
#
# on_failure:
#   log_and_skip         — logg og fortsett neste fetcher
#   retry_with_backoff   — tenacity-retry før opp-gi
#   raise                — kast exception, stopp pipeline

fetchers:
  prices:
    module: bedrock.fetch.prices
    cron: "40 * * * 1-5"       # hverdager hver time :40
    stale_hours: 30            # EOD-priser aksepterer ~1 dag forsinkelse
    on_failure: retry_with_backoff
    table: prices
    ts_column: ts

  cot_disaggregated:
    module: bedrock.fetch.cot_cftc
    cron: "0 22 * * 5"         # fredag 22:00 UTC (etter CFTC-publisering)
    stale_hours: 168           # ukentlig
    on_failure: log_and_skip
    table: cot_disaggregated
    ts_column: report_date

  cot_legacy:
    module: bedrock.fetch.cot_cftc
    cron: "0 22 * * 5"
    stale_hours: 168
    on_failure: log_and_skip
    table: cot_legacy
    ts_column: report_date

  fundamentals:
    module: bedrock.fetch.fred
    cron: "30 2 * * *"          # daglig 02:30 UTC
    stale_hours: 48             # FRED-data har 1-3 dagers publiserings-lag
    on_failure: retry_with_backoff
    table: fundamentals
    ts_column: date

  weather:
    module: bedrock.fetch.weather
    cron: "0 3 * * *"           # daglig 03:00 UTC
    stale_hours: 30
    on_failure: retry_with_backoff
    table: weather
    ts_column: date

  enso:
    module: bedrock.fetch.enso
    cron: "0 6 12 * *"          # 12. i måneden 06:00 UTC (etter NOAAs ~10.-publisering)
    stale_hours: 720            # månedlig — toler 30 dagers etterslep
    on_failure: log_and_skip
    table: fundamentals          # ADR-005: lagres som series_id="NOAA_ONI"
    ts_column: date

  # MERK: systemd OnCalendar tolkes i lokal TZ (Oslo: CEST/CET), ikke UTC.
  # Tidene under er valgt så de lander ETTER kildens publisering Oslo-tid.
  wasde:
    module: bedrock.fetch.wasde
    cron: "0 19 13 * *"         # 13. i mnd 19:00 Oslo (etter USDA noon ET = 18:00 Oslo)
    stale_hours: 840            # månedlig — buffer 35 dager
    on_failure: log_and_skip
    table: wasde
    ts_column: report_date

  crop_progress:
    module: bedrock.fetch.nass
    cron: "0 23 * 4-11 1"       # Mon 23:00 Oslo, kun apr-nov (NASS rel. 16 ET = 22 Oslo)
    stale_hours: 200            # ukentlig under sesong; off-season vil naturlig vise stale
    on_failure: log_and_skip
    table: crop_progress
    ts_column: week_ending

  # Sub-fase 12.5+ session 113: bdi-runner rebrandet til shipping
  # (full Baltic-suite BDI+BCI+BPI+BSI, long-format `shipping_indices`).
  # BDI auto-hentes fra Yahoo BDRY ETF; BCI/BPI/BSI fra manuell CSV
  # (`data/manual/shipping_indices.csv`) per ADR-007 § 4.
  shipping:
    module: bedrock.fetch.shipping
    cron: "30 23 * * 1-5"       # Mon-Fri 23:30 Oslo (etter US close 22 Oslo + Yahoo-lag)
    stale_hours: 30             # daglig på hverdager
    on_failure: retry_with_backoff
    table: shipping_indices
    ts_column: date

  # Sub-fase 12.5+ session 105 (ADR-007/008): Forex Factory økonomisk
  # kalender. JSON-en endrer seg når nye events legges til eller når
  # forecast/previous fylles inn 1-2 timer før release. Daglig 2× er
  # mer enn nok for event_distance-driveren (timing-krav 4-24t).
  calendar_ff:
    module: bedrock.fetch.calendar_ff
    cron: "15 6,18 * * *"        # 06:15 + 18:15 Oslo (morgen EU + ettermiddag US)
    stale_hours: 14              # 14h slack — første timer-fire kveld OK selv etter 06:15-fetch
    on_failure: log_and_skip
    table: econ_events
    ts_column: fetched_at

  # Sub-fase 12.5+ session 106 (ADR-007/008): ICE Futures Europe COT.
  # ICE publiserer fredag 18:30 London = 19:30 Oslo for tirsdag-snapshot.
  # Vi fyrer 22:30 Oslo med buffer for opplastingstid. Runneren har
  # smart-skip: hvis DB allerede har siste tirsdag-rad, hopper den
  # over HTTP-kallet (gratis-API-etiquette).
  cot_ice:
    module: bedrock.fetch.cot_ice
    cron: "30 22 * * 5"          # Fre 22:30 Oslo (etter ICE 19:30 + buffer)
    stale_hours: 168             # ukentlig
    on_failure: log_and_skip
    table: cot_ice
    ts_column: report_date

  # Sub-fase 12.5+ session 107 (ADR-007/008): EIA weekly inventories
  # (petroleum + natural gas storage). Petroleum publiseres ons 10:30 ET
  # = 16:30 Oslo; nat-gas ons-tor avhengig av helligdager. Smart-skip
  # i runneren hopper HTTP-kall hvis DB allerede har siste onsdag.
  eia_inventories:
    module: bedrock.fetch.eia_inventories
    cron: "30 17 * * 3"          # Ons 17:30 Oslo (etter EIA 16:30 + buffer)
    stale_hours: 200             # ukentlig + nat-gas-slack
    on_failure: log_and_skip
    table: eia_inventory
    ts_column: date

  # Sub-fase 12.5+ session 108 (ADR-007/008): COMEX warehouse-inventories
  # for gull/sølv/kobber via metalcharts.org's JSON-API. Daglig publisering
  # T-1; smart-skip i runneren hopper HTTP hvis DB allerede har siste
  # børsdag.
  comex:
    module: bedrock.fetch.comex
    cron: "0 22 * * 1-5"         # Mon-Fri 22:00 Oslo (etter COMEX-close + buffer)
    stale_hours: 30              # daglig
    on_failure: log_and_skip
    table: comex_inventory
    ts_column: date

  # Sub-fase 12.5+ session 109 (ADR-007/008): USGS seismic events M≥4.5
  # i mining-regioner. Daglig refresh; USGS oppdaterer feeden hvert
  # minutt men refresh-cost er trivialt.
  seismic:
    module: bedrock.fetch.seismic
    cron: "0 4 * * *"            # Daglig 04:00 Oslo
    stale_hours: 30
    on_failure: log_and_skip
    table: seismic_events
    ts_column: event_ts

  # Sub-fase 12.5+ session 110 (ADR-007/008): Euronext MiFID II COT
  # for Milling Wheat (EBM) + Corn (EMA) + Canola (ECO). Publiseres
  # ons ettermiddag for forrige fredag-snapshot.
  cot_euronext:
    module: bedrock.fetch.cot_euronext
    cron: "0 18 * * 3"           # Ons 18:00 Oslo (etter publisering)
    stale_hours: 168             # ukentlig
    on_failure: log_and_skip
    table: cot_euronext
    ts_column: report_date

  # Sub-fase 12.5+ session 111 (ADR-007/008): Conab Brazil monthly crop
  # estimates (Soja/Milho/Trigo/Algodão + Café). PDF via poppler-utils
  # primær + pypdf fallback per ADR-007 § 6. Conab publiserer rundt
  # 12.-15. hver måned.
  conab:
    module: bedrock.fetch.conab
    cron: "0 20 15 * *"          # 15. i mnd 20:00 Oslo (etter Conab)
    stale_hours: 720             # månedlig (30d)
    on_failure: log_and_skip
    table: conab_estimates
    ts_column: report_date

  # Sub-fase 12.5+ session 112 (ADR-007/008): UNICA Brazil sugar/ethanol
  # halvmånedlige rapporter (Centro-Sul). PDF via poppler-utils + pypdf-
  # fallback. UNICA publiserer ~1. + ~16. hver måned.
  unica:
    module: bedrock.fetch.unica
    cron: "0 21 1,16 * *"        # 1. + 16. i mnd 21:00 Oslo
    stale_hours: 360             # halvmånedlig (~15d)
    on_failure: log_and_skip
    table: unica_reports
    ts_column: report_date
