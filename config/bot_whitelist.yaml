# Bot whitelist + navne-mapping
#
# Liste over instrumenter som skal pushes til bedrock-boten.
# Bedrock kan generere signaler for flere instrumenter, og pr. nå
# leveres alle 22 til boten — observasjons-vindu over de første ukene
# brukes for å se rebalansering før evt. innstramming.
#
# Kilde: ``src/bedrock/bot/instruments.py:INSTRUMENT_MAP`` (cTrader-side).
#
# Format: bedrock-instrument-id → bot-instrument-name. Hvis bedrock-id
# matcher bot-navn nøyaktig (f.eks. "Corn"), bruk samme verdi.
# Lookup er case-insensitive, så "BTC" matcher "Btc" fra YAML-stem.
#
# `bedrock signals-all --bot-only` filtrerer signals.json til kun disse
# instrumentene + transformerer instrument-id til bot-navn.

mapping:
  # FX (4 stk — bedrock-id matcher bot-navn)
  EURUSD: EURUSD
  USDJPY: USDJPY
  GBPUSD: GBPUSD
  AUDUSD: AUDUSD

  # Metals
  Gold: GOLD
  Silver: SILVER
  Platinum: PLATINUM
  Copper: COPPER

  # Energy
  CrudeOil: "OIL WTI"
  Brent: "OIL BRENT"
  NaturalGas: NATGAS

  # Indices
  SP500: SPX500
  Nasdaq: US100

  # Crypto
  BTC: BTC
  ETH: ETH

  # Agri (7 stk — bedrock-id matcher bot-navn nøyaktig)
  Corn: Corn
  Wheat: Wheat
  Soybean: Soybean
  Coffee: Coffee
  Cotton: Cotton
  Sugar: Sugar
  Cocoa: Cocoa

# ---------------------------------------------------------------------------
# Per-horisont kvalifisering (sub-fase 12.8 § 20.7)
# ---------------------------------------------------------------------------
# Bot-whitelist over kvalifiserer for **Macro + Swing**. Kjerne-17
# (FX/metals/energy/indices/agri ekskl. de 5 nye) har ≥5 år priser,
# ≥3 år CFTC for primær-kontrakten, og strukturelle kilder ferske per
# coverage-rapport. Brent + Copper har ≥4 år CFTC (CFTC publiserte ikke
# før 2022) — borderline, men aksepteres siden kvalitet > kvantitet for
# Brent (Brent Last Day-kontrakten er primær for globale crude-flow-
# signaler).
#
# Eksperimentelle 5 (BTC, ETH, NaturalGas, Copper, Platinum) er nå
# inkludert i observasjons-vinduet — alle setups med entry/SL/TP tas
# de første ukene for å samle data til rebalansering. Kvalifiserer kun
# for Macro+Swing til Plan-S; signal-kvalitet vurderes etter vinduet.
#
# **Scalp**: ingen instrumenter kvalifiserer for Scalp-handel før
# sub-fase Plan-S (PLAN § 19.10) leverer:
#   - calendar_ff forecast/prev/actual-trio (i dag mangler `actual`-feltet
#     fra Forex Factory JSON-feed; må hentes fra alternativ kilde)
#   - surprise-vs-consensus driver-feature (delta = actual - forecast,
#     z-normalisert)
#   - VIX9D/VIX3M-termstruktur-driver (data finnes i fundamentals; driver
#     er Plan-S-arbeid etter at session 138 droppet vix_term_ratio)
#   - cross-asset-leder-mønster (BRL→Coffee/Sugar 1-5 min, DXY→Gold,
#     VIX→SP500, US10Y→USDJPY) som event-driven scalp-trigger
#   - real-time event-detektor for seismic M≥6 i Cu/Au/Ag-mining-regioner
#
# Bot-handel kjører på SWING/MAKRO-horisontene per default. SCALP-signaler
# fra signal_server filtreres ut til Plan-S leverer scalp-arkitektur.
