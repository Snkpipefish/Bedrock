# Bot whitelist + navne-mapping
#
# Liste over instrumenter som skal pushes til scalp_edge-boten.
# Bedrock kan generere signaler for flere instrumenter (eksperimenter,
# crypto, base metals etc.), men kun de som står her sendes til bot.
#
# Kilde: ``~/scalp_edge/signal_server.py:VALID_INSTRUMENTS``
#
# Format: bedrock-instrument-id → bot-instrument-name. Hvis bedrock-id
# matcher bot-navn nøyaktig (f.eks. "Corn"), bruk samme verdi.
#
# `bedrock signals-all --bot-only` filtrerer signals.json til kun disse
# instrumentene + transformerer instrument-id til bot-navn.

mapping:
  # FX (4 stk — bedrock-id matcher bot-navn)
  EURUSD: EURUSD
  USDJPY: USDJPY
  GBPUSD: GBPUSD
  AUDUSD: AUDUSD

  # Metals
  Gold: GOLD
  Silver: SILVER

  # Energy
  CrudeOil: "OIL WTI"
  Brent: "OIL BRENT"

  # Indices
  SP500: SPX500
  Nasdaq: US100

  # Agri (7 stk — bedrock-id matcher bot-navn nøyaktig)
  Corn: Corn
  Wheat: Wheat
  Soybean: Soybean
  Coffee: Coffee
  Cotton: Cotton
  Sugar: Sugar
  Cocoa: Cocoa

# Instrumenter NOT i whitelist (genereres av bedrock men ikke pushes):
# - Copper, Platinum (eksperimentelle metals)
# - NaturalGas (energy, men ikke aktivert i bot)
# - BTC, ETH (crypto, ikke aktivert i bot)

# ---------------------------------------------------------------------------
# Per-horisont kvalifisering (sub-fase 12.8 § 20.7)
# ---------------------------------------------------------------------------
# Bot-whitelist over kvalifiserer for **Macro + Swing** (alle 17 instrumenter
# har ≥5 år priser, ≥3 år CFTC for primær-kontrakten, og strukturelle
# kilder ferske per coverage-rapport). Brent + Copper har ≥4 år CFTC
# (CFTC publiserte ikke før 2022) — borderline, men aksepteres siden
# kvalitet > kvantitet for Brent (Brent Last Day-kontrakten er primær for
# globale crude-flow-signaler).
#
# **Scalp**: ingen instrumenter kvalifiserer for Scalp-handel før
# sub-fase Plan-S (PLAN § 19.10) leverer:
#   - calendar_ff forecast/prev/actual-trio (i dag mangler `actual`-feltet
#     fra Forex Factory JSON-feed; må hentes fra alternativ kilde)
#   - surprise-vs-consensus driver-feature (delta = actual - forecast,
#     z-normalisert)
#   - VIX9D/VIX3M-termstruktur-driver (data finnes i fundamentals; driver
#     er Plan-S-arbeid etter at session 138 droppet vix_term_ratio)
#   - cross-asset-leder-mønster (BRL→Coffee/Sugar 1-5 min, DXY→Gold,
#     VIX→SP500, US10Y→USDJPY) som event-driven scalp-trigger
#   - real-time event-detektor for seismic M≥6 i Cu/Au/Ag-mining-regioner
#
# Bot-handel kjører på SWING/MAKRO-horisontene per default. SCALP-signaler
# fra signal_server filtreres ut til Plan-S leverer scalp-arkitektur.
